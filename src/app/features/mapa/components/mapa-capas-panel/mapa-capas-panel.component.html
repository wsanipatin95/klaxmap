<div class="layers-panel">
  <div class="layers-tree">
    <label class="layers-root-row">
      <input #rootToggle type="checkbox" [checked]="allVisible()" (change)="onRootToggle(rootToggle.checked)" />
      <span class="layers-expander">▾</span>
      <span class="">Todos</span>
    </label>

    <div class="layers-children">
      <label class="layer-row" *ngFor="let t of tipos; trackBy: trackByTipo">
        <input type="checkbox" [checked]="visible(t.idGeoTipoElemento)" (change)="toggle(t.idGeoTipoElemento)" />

        <span class="layer-preview" [ngClass]="previewShapeClass(t)" [ngStyle]="previewStyle(t)"
          aria-hidden="true"></span>

        <span class="layer-name">{{ t.nombre }}</span>
      </label>
    </div>
  </div>
</div>
