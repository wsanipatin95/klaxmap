<div class="bkpPageShell">
  <app-bkp-page-header [title]="title" [subtitle]="subtitle"><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" [disabled]="saving()" (click)="nuevo()"></button></app-bkp-page-header>
  <p-confirmDialog></p-confirmDialog>
  <section class="toolbarCard"><div class="searchBox"><i class="pi pi-search"></i><input pInputText [ngModel]="q()" (ngModelChange)="q.set($event??'')" placeholder="Buscar..." (keyup.enter)="cargar()"></div><div class="toolbarActions"><div class="microStats"><span class="microStat"><small>Registros</small><strong>{{items().length}}</strong></span></div><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-times" [disabled]="!q()" (click)="q.set('');cargar()"></button></div></section>
  <section class="noticeStrip" *ngIf="loading()||saving()||success()||error()||dirty()"><span class="noticePill is-info" *ngIf="loading()">Cargando</span><span class="noticePill is-info" *ngIf="saving()">Guardando</span><span class="noticePill is-success" *ngIf="success()">{{success()}}</span><span class="noticePill is-danger" *ngIf="error()">{{error()}}</span><span class="noticePill is-warning" *ngIf="dirty()">Sin guardar</span></section>
  <section class="bkpWorkspace"><aside class="contentCard sidebarPanel"><div class="sectionHead"><div><h4>{{title}}</h4><div class="secondaryCell">{{items().length}} registro(s)</div></div></div><div class="listScroll" *ngIf="items().length;else empty"><button type="button" class="entityRow" *ngFor="let item of items()" [class.selected]="selected()?.[idField]===item[idField]" (click)="seleccionar(item)"><div class="entityRow__main"><strong>{{label(item)}}</strong><span>{{detail(item)}}</span></div><span class="miniBadge" [class.is-accent]="item.activo!==false">{{item.activo===false?'Inactivo':'Activo'}}</span></button></div></aside><section class="contentCard editorPanel"><div class="sectionHead"><div><h4>{{mode()==='crear'?'Nuevo':'Editar'}} {{title}}</h4><div class="secondaryCell">Edición JSON completa del registro.</div></div><div class="rowActions"><button *ngIf="selected()" pButton type="button" severity="danger" [text]="true" icon="pi pi-trash" label="Eliminar" [disabled]="saving()" (click)="eliminar()"></button></div></div><div class="editorScroll"><textarea pTextarea class="jsonEditor" [ngModel]="jsonText()" (ngModelChange)="onJsonChange($event)"></textarea><div class="editorActions"><button pButton type="button" severity="secondary" [text]="true" label="Cancelar" (click)="selected()?hydrate(selected()):nuevo()"></button><button pButton type="button" icon="pi pi-save" label="Guardar" [loading]="saving()" (click)="guardar()"></button></div></div></section></section>
  <ng-template #empty><app-bkp-empty-state icon="pi pi-inbox" [title]="'Sin '+title" subtitle="Crea el primer registro."></app-bkp-empty-state></ng-template>
</div>
