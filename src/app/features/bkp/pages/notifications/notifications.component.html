<div class="bkpPageShell"><app-bkp-page-header title="Notificaciones" subtitle="Contactos, reglas e integraciones para correo y WhatsApp."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><p-confirmDialog></p-confirmDialog><div class="tabBar"><button class="tabButton" [class.active]="tab()==='contacts'" (click)="tab.set('contacts');nuevo()">Contactos</button><button class="tabButton" [class.active]="tab()==='rules'" (click)="tab.set('rules');nuevo()">Reglas</button><button class="tabButton" [class.active]="tab()==='integrations'" (click)="tab.set('integrations');nuevo()">Integraciones</button></div><section class="bkpWorkspace"><aside class="contentCard sidebarPanel"><div class="sectionHead"><div><h4>{{tab()}}</h4><div class="secondaryCell">{{items().length}} registro(s)</div></div></div><div class="listScroll"><button class="entityRow" type="button" *ngFor="let item of items()" [class.selected]="selected()?.[idField()]===item[idField()]" (click)="seleccionar(item)"><div class="entityRow__main"><strong>{{item.nombre}}</strong><span>{{item.canal||item.eventType||item.providerType}} · {{item.destinatario||item.baseUrl||''}}</span></div></button></div></aside><section class="contentCard editorPanel"><div class="sectionHead"><div><h4>Editor JSON</h4><div class="secondaryCell">Configuración completa.</div></div></div><div class="editorScroll"><textarea pTextarea class="jsonEditor" [ngModel]="jsonText()" (ngModelChange)="onChange($event)"></textarea><div class="editorActions"><button pButton type="button" icon="pi pi-save" label="Guardar" [loading]="saving()" (click)="guardar()"></button></div></div></section></section></div>
