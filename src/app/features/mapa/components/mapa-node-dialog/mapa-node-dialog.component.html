<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '34rem' }"
  [header]="title()"
>
  <div class="dialog-body">
    <div class="callout" *ngIf="mode() === 'create' && parentNode() as parent">
      El nuevo nodo se creará dentro de <strong>{{ parent.nodo }}</strong>.
    </div>

    <label>Nombre</label>
    <input type="text" [(ngModel)]="form.nodo" placeholder="Ej. GUACHALA / SAN JOSE MORAN" />

    <label>Descripción</label>
    <textarea rows="4" [(ngModel)]="form.descripcion" placeholder="Descripción opcional"></textarea>

    <label>Tipo de nodo</label>
    <select [(ngModel)]="form.tipoNodo">
      <option value="carpeta">Carpeta</option>
      <option value="zona">Zona</option>
      <option value="sitio">Sitio</option>
      <option value="nodo_fisico">Nodo físico</option>
    </select>

    <label>Código</label>
    <input type="text" [(ngModel)]="form.codigo" placeholder="Código opcional" />

    <label>Orden</label>
    <input type="number" [(ngModel)]="form.orden" />

    <label class="check-row">
      <input type="checkbox" [(ngModel)]="form.visible" />
      <span>Visible</span>
    </label>

    <p class="error" *ngIf="error() as err">{{ err }}</p>
  </div>

  <ng-template pTemplate="footer">
    <button pButton type="button" label="Cancelar" severity="secondary" (click)="close()"></button>
    <button
      pButton
      type="button"
      [label]="mode() === 'create' ? 'Crear nodo' : 'Guardar cambios'"
      (click)="submit()"
    ></button>
  </ng-template>
</p-dialog>
