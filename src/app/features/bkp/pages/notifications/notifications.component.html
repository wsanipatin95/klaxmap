<p-confirmDialog></p-confirmDialog><div class="bkpPageShell"><app-bkp-page-header eyebrow="Alertas" title="Notificaciones" subtitle="Contactos, reglas por evento y providers EMAIL, WhatsApp, Telegram o Webhook."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><section class="bkpInfoStrip" *ngIf="loading()||saving()||dirty()||error()||success()"><span class="bkpNotice info" *ngIf="loading()">Cargando</span><span class="bkpNotice info" *ngIf="saving()">Guardando</span><span class="bkpNotice warn" *ngIf="dirty()">Cambios pendientes</span><span class="bkpNotice danger" *ngIf="error()">{{error()}}</span><span class="bkpNotice success" *ngIf="success()">{{success()}}</span></section><div class="bkpTabRail"><button class="bkpTab" [class.active]="tab()==='contacts'" (click)="setTab('contacts')">Contactos</button><button class="bkpTab" [class.active]="tab()==='rules'" (click)="setTab('rules')">Reglas</button><button class="bkpTab" [class.active]="tab()==='providers'" (click)="setTab('providers')">Providers</button></div><section class="bkpWorkbench"><aside class="bkpPanel pad"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>{{tab()==='contacts'?'Contactos':tab()==='rules'?'Reglas':'Providers'}}</h3></div></div><div class="bkpList"><button class="bkpRow" *ngFor="let c of contacts()" [hidden]="tab()!=='contacts'" [class.active]="selectedContact()?.idBkpNotificationContact===c.idBkpNotificationContact" (click)="seleccionarContact(c)"><span><strong>{{c.nombre}}</strong><small>{{c.canal}} · {{c.destinatario}}</small></span></button><button class="bkpRow" *ngFor="let r of rules()" [hidden]="tab()!=='rules'" [class.active]="selectedRule()?.idBkpNotificationRule===r.idBkpNotificationRule" (click)="seleccionarRule(r)"><span><strong>{{r.nombre}}</strong><small>{{r.eventType}}</small></span></button><button class="bkpRow" *ngFor="let p of providers()" [hidden]="tab()!=='providers'" [class.active]="selectedProvider()?.idBkpIntegrationProvider===p.idBkpIntegrationProvider" (click)="seleccionarProvider(p)"><span><strong>{{p.nombre}}</strong><small>{{p.providerType}} · {{p.baseUrl||'-'}}</small></span></button></div></aside><section class="bkpPanel pad"><form class="bkpForm" [formGroup]="contactForm" (ngSubmit)="guardarContact()" *ngIf="tab()==='contacts'"><div class="bkpFormGrid"><div class="bkpField"><label>Nombre *</label><input formControlName="nombre"></div><div class="bkpField"><label>Canal *</label><select formControlName="canal"><option *ngFor="let c of canales()" [value]="c">{{c}}</option></select></div><div class="bkpField full"><label>Destinatario *</label><input formControlName="destinatario"></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selectedContact()" (click)="eliminar()"></button><button pButton type="submit" label="Guardar contacto" icon="pi pi-save" [loading]="saving()"></button></div></form><form class="bkpForm" [formGroup]="ruleForm" (ngSubmit)="guardarRule()" *ngIf="tab()==='rules'"><div class="bkpFormGrid"><div class="bkpField"><label>Nombre *</label><input formControlName="nombre"></div><div class="bkpField"><label>Evento *</label><select formControlName="eventType"><option *ngFor="let e of eventTypes()" [value]="e">{{e}}</option></select></div><div class="bkpField"><label>Contacto *</label><select formControlName="idBkpNotificationContactFk"><option [ngValue]="null">Seleccione...</option><option *ngFor="let c of contacts()" [ngValue]="c.idBkpNotificationContact">{{c.nombre}} · {{c.canal}}</option></select></div><div class="bkpField"><label>Provider</label><select formControlName="idBkpIntegrationProviderFk"><option [ngValue]="null">Automático</option><option *ngFor="let p of providers()" [ngValue]="p.idBkpIntegrationProvider">{{p.nombre}} · {{p.providerType}}</option></select></div><div class="bkpField"><label>Solo plan</label><select formControlName="onlyForPlanId"><option [ngValue]="null">Todos</option><option *ngFor="let p of plans()" [ngValue]="p.idBkpPlan">{{p.nombre}}</option></select></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selectedRule()" (click)="eliminar()"></button><button pButton type="submit" label="Guardar regla" icon="pi pi-save" [loading]="saving()"></button></div></form><form class="bkpForm" [formGroup]="providerForm" (ngSubmit)="guardarProvider()" *ngIf="tab()==='providers'"><div class="bkpFormGrid"><div class="bkpField"><label>Nombre *</label><input formControlName="nombre"></div><div class="bkpField"><label>Tipo *</label><select formControlName="providerType"><option *ngFor="let p of providerTypes()" [value]="p">{{p}}</option></select></div><div class="bkpField"><label>Base URL</label><input formControlName="baseUrl"></div><div class="bkpField"><label>Session</label><input formControlName="sessionName"></div><div class="bkpField full"><label>Secreto auth</label><select formControlName="idBkpSecretAuthFk"><option [ngValue]="null">Sin secreto</option><option *ngFor="let s of secrets()" [ngValue]="s.idBkpSecret">{{s.nombre}} · {{s.tipoSecret}}</option></select></div><div class="bkpField full"><label>Config JSON</label><textarea formControlName="configJson"></textarea></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selectedProvider()" (click)="eliminar()"></button><button pButton type="submit" label="Guardar provider" icon="pi pi-save" [loading]="saving()"></button></div></form></section></section></div>
