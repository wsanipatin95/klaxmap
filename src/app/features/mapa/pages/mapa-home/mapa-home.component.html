<app-mapa-layout>
  <app-mapa-toolbar
    slot="toolbar"
    [selectedName]="selectedElemento()?.nombre ?? null"
    [totalElementos]="totalElementos()"
    (refreshRequested)="onRefresh()"
    (exportRequested)="abrirExportacion()"
    (importRequested)="abrirImportacion()"
  />

  <app-mapa-sidebar
    slot="sidebar"
    [nodos]="nodos()"
    [tipos]="tipos()"
    [selectedNodoId]="selectedNodo()?.idRedNodo ?? null"
    [selectedTipoId]="filtros.idGeoTipoElementoFk()"
    [searchValue]="filtros.q()"
    (searchChange)="onSearchChange($event)"
    (nodoSelected)="onNodoSelect($event)"
    (tipoSelected)="onTipoSelect($event)"
  />

  <app-mapa-canvas
    #mapCanvas
    slot="canvas"
    [elementos]="elementos()"
    [tipos]="tipos()"
    [toolMode]="ui.toolMode()"
    [selectedElementoId]="selectedElemento()?.idGeoElemento ?? null"
    [hiddenTipoIds]="capas.hiddenTipoIds()"
    (elementoSelected)="onElementoSelect($event)"
    (geometryCreated)="onGeometryCreated($event)"
    (geometryEdited)="onGeometryEdited($event)"
    (elementoContext)="openContextMenu($event)"
  />

  <app-mapa-properties-panel
    slot="properties"
    [elemento]="selectedElemento()"
    [tipos]="tipos()"
    [nodos]="nodos()"
    (saved)="onElementoUpdated($event)"
    (deleted)="onElementoDeleted($event)"
  />

  <app-mapa-statusbar
    slot="status"
    [totalElementos]="totalElementos()"
    [modo]="ui.toolMode()"
    [loading]="ui.loading()"
    [selectedName]="selectedElemento()?.nombre ?? null"
  />
</app-mapa-layout>

<div class="mapa-quick-info">
  {{ quickInfo() }}
</div>

<app-mapa-import-dialog
  #importDialog
  (imported)="onImported()"
></app-mapa-import-dialog>

<app-mapa-export-dialog
  #exportDialog
  [nodos]="nodos()"
  [tipos]="tipos()"
></app-mapa-export-dialog>

<app-mapa-create-element-dialog
  #createDialog
  [nodos]="nodos()"
  [tipos]="tipos()"
  (submitted)="crearElemento($event)"
></app-mapa-create-element-dialog>

<app-mapa-context-menu
  [visible]="contextVisible()"
  [x]="contextX()"
  [y]="contextY()"
  [elemento]="contextElemento()"
  (closeRequested)="closeContextMenu()"
  (centerRequested)="centerContextElemento($event)"
  (editDataRequested)="editDataContextElemento($event)"
  (editGeometryRequested)="editGeometryContextElemento($event)"
  (deleteRequested)="deleteContextElemento($event)"
></app-mapa-context-menu>

<div class="mapa-error" *ngIf="error() as err">
  <div class="mapa-error-title">Ocurrió un problema</div>
  <div class="mapa-error-text">{{ err }}</div>
  <button type="button" class="mapa-error-close" (click)="clearError()">Cerrar</button>
</div>
