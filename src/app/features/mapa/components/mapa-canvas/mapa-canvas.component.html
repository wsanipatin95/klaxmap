<div class="mapa-canvas-shell">
  <div class="mapa-overlay-left" *ngIf="measureActive">
    <div class="mapa-measure-card">
      <div class="mapa-measure-title">Medición</div>
      <div class="mapa-measure-distance">{{ measureDistanceText }}</div>
      <div class="mapa-measure-help">
        {{
          measureStarted
            ? 'Haz clic para seguir midiendo y doble clic para terminar.'
            : 'Haz clic en el mapa para iniciar una medición.'
        }}
      </div>
      <div class="mapa-measure-actions">
        <button type="button" class="mapa-measure-btn" (click)="clearMeasurement()">
          Limpiar
        </button>
      </div>
    </div>
  </div>

  <div #mapContainer class="mapa-canvas"></div>
</div>
