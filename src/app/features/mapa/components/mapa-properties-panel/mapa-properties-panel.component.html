<div class="properties-shell" [class.open]="open">
  <div class="properties-overlay" *ngIf="open" (click)="onOverlayClick()"></div>

  <aside class="properties-drawer" [class.open]="open" (click)="onPanelClick($event)">
    <ng-container *ngIf="elemento; else emptyState">
      <div class="panel-header">
        <div class="panel-title-wrap">
          <div class="title-row">
            <h3 [title]="elemento.nombre">{{ elemento.nombre }}</h3>
            <span class="dirty-badge" *ngIf="dirty()">Sin guardar</span>
          </div>

          <small>
            {{ elemento.geomTipo }} · {{ elemento.estado }}{{ elemento.fecFin ? ' · eliminado' : '' }}
          </small>
        </div>

        <div class="panel-actions">
          <button
            type="button"
            class="close-btn"
            aria-label="Cerrar panel"
            (click)="requestClose()"
          >
            ×
          </button>
        </div>
      </div>

      <div class="panel-tabs">
        <button
          type="button"
          class="panel-tab-btn"
          [class.active]="activeTab() === 'edicion'"
          (click)="setTab('edicion')"
        >
          Edición
        </button>

        <button
          type="button"
          class="panel-tab-btn"
          [class.active]="activeTab() === 'historial'"
          (click)="setTab('historial')"
        >
          Historial
        </button>
      </div>

      <div class="panel-body">
        <section class="panel-view" *ngIf="activeTab() === 'edicion'">
          <div class="panel-view-scroll">
            <section class="panel-section">
              <app-mapa-properties-tabs
                [elemento]="elemento"
                [tipos]="tipos"
                [nodos]="nodos"
                (saved)="onSaved($event)"
                (deleted)="onDeleted($event)"
                (restored)="onRestored($event)"
                (dirtyChange)="onDirtyStateChanged($event)"
              />
            </section>
          </div>
        </section>

        <section class="panel-view" *ngIf="activeTab() === 'historial'">
          <div class="panel-view-scroll">
            <app-auditoria-registro
              [tabla]="'kxt_geo_elemento'"
              [idRegistro]="elemento.idGeoElemento"
              [refreshKey]="auditRefreshKey()"
              [compact]="true"
              titulo="Historial del elemento"
              subtitulo="Mira qué cambió, quién lo hizo y cómo quedó"
            />
          </div>
        </section>
      </div>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        Selecciona un elemento.
      </div>
    </ng-template>
  </aside>
</div>
