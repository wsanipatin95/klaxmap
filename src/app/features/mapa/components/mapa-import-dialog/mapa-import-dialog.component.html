<p-dialog
  [visible]="visible()"
  (visibleChange)="onDialogVisibilityChange($event)"
  [modal]="true"
  [closable]="!loading()"
  [dismissableMask]="!loading()"
  [closeOnEscape]="!loading()"
  [style]="{ width: '34rem' }"
  header="Importar KML"
>
  <div class="dialog-body" [class.is-busy]="loading()">
    <div class="dialog-blocker" *ngIf="loading()">
      <div class="dialog-blocker-card">
        <div class="dialog-blocker-title">Importando archivo...</div>
        <div class="dialog-blocker-text">
          Espera un momento mientras se procesa el lote.
        </div>
      </div>
    </div>

    <div class="dialog-note">Carga un archivo y procesa el lote.</div>

    <label class="upload-box" [class.is-disabled]="loading()">
      <input
        #fileInput
        type="file"
        accept=".kml,.kmz"
        [disabled]="loading()"
        (change)="onFileSelected($event)"
      />
      <span class="upload-title">Seleccionar archivo</span>
      <span class="upload-name">{{ fileName }}</span>
    </label>

    <p class="error" *ngIf="error() as err">{{ err }}</p>

    <div class="result-card" *ngIf="result() as r">
      <div class="result-title">Resultado</div>

      <div class="result-grid">
        <div><span>Lote</span><strong>{{ r.idGeoImportLote }}</strong></div>
        <div><span>Estado</span><strong>{{ r.estado }}</strong></div>
        <div><span>Nodos</span><strong>{{ r.totalNodos }}</strong></div>
        <div><span>Elementos</span><strong>{{ r.totalElementos }}</strong></div>
        <div><span>OK</span><strong>{{ r.totalOk }}</strong></div>
        <div><span>Error</span><strong>{{ r.totalError }}</strong></div>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      label="Cerrar"
      severity="secondary"
      [disabled]="loading()"
      (click)="close()"
    ></button>

    <button
      pButton
      type="button"
      label="{{ loading() ? 'Importando...' : 'Importar' }}"
      [disabled]="loading() || !selectedFile()"
      (click)="importar()"
    ></button>
  </ng-template>
</p-dialog>
