<p-confirmDialog></p-confirmDialog><div class="bkpPageShell"><app-bkp-page-header eyebrow="Almacenamiento" title="Destinos" subtitle="Rutas locales, buckets S3 o carpetas Google Drive."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><section class="bkpToolbar"><div class="bkpSearchBox"><i class="pi pi-search"></i><input [value]="q()" (input)="q.set($any($event.target).value)" placeholder="Buscar destino..." (keyup.enter)="cargar()"></div><button pButton type="button" label="Buscar" icon="pi pi-search" (click)="cargar()"></button></section><section class="bkpInfoStrip" *ngIf="loading()||saving()||dirty()||error()||success()"><span class="bkpNotice info" *ngIf="loading()">Cargando</span><span class="bkpNotice info" *ngIf="saving()">Guardando</span><span class="bkpNotice warn" *ngIf="dirty()">Cambios pendientes</span><span class="bkpNotice danger" *ngIf="error()">{{error()}}</span><span class="bkpNotice success" *ngIf="success()">{{success()}}</span></section><section class="bkpWorkbench"><aside class="bkpPanel pad"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>Destinos</h3><p>{{items().length}} registro(s)</p></div></div><div class="bkpList" *ngIf="items().length;else empty"><button class="bkpRow" type="button" *ngFor="let i of items()" [class.active]="selected()?.idBkpStorageDestination===i.idBkpStorageDestination" (click)="seleccionar(i)"><span><strong>{{i.nombre}}</strong><small>{{i.tipoStorage}} · {{i.basePath||i.bucketName||i.folderId||'-'}}</small></span><span class="bkpBadge" [class.ok]="i.activo!==false">{{i.retentionDays||0}} días</span></button></div><ng-template #empty><app-bkp-empty-state icon="pi pi-cloud-upload" title="Sin destinos" subtitle="Configura al menos un destino."></app-bkp-empty-state></ng-template></aside><section class="bkpPanel pad"><form class="bkpForm" [formGroup]="form" (ngSubmit)="guardar()"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>{{selected()?'Editar destino':'Nuevo destino'}}</h3><p>El tipo determina qué campos son obligatorios.</p></div></div><div class="bkpFormGrid"><div class="bkpField"><label>Nombre *</label><input formControlName="nombre"></div><div class="bkpField"><label>Tipo *</label><select formControlName="tipoStorage"><option *ngFor="let t of storageTypes()" [value]="t">{{t}}</option></select></div><div class="bkpField"><label>Provider</label><select formControlName="idBkpIntegrationProviderFk"><option [ngValue]="null">Sin provider</option><option *ngFor="let p of integrations()" [ngValue]="p.idBkpIntegrationProvider">{{p.nombre}} · {{p.providerType}}</option></select></div><div class="bkpField"><label>Secreto credencial</label><select formControlName="idBkpSecretCredentialFk"><option [ngValue]="null">Sin secreto</option><option *ngFor="let s of secrets()" [ngValue]="s.idBkpSecret">{{s.nombre}} · {{s.tipoSecret}}</option></select></div><div class="bkpField"><label>Base path LOCAL</label><input formControlName="basePath"></div><div class="bkpField"><label>Bucket S3</label><input formControlName="bucketName"></div><div class="bkpField"><label>Prefix path</label><input formControlName="prefixPath"></div><div class="bkpField"><label>Folder ID Drive</label><input formControlName="folderId"></div><div class="bkpField"><label>Retención días *</label><input type="number" formControlName="retentionDays"></div><div class="bkpField"><label>Inmutable</label><select formControlName="immutableEnabled"><option [ngValue]="false">No</option><option [ngValue]="true">Sí</option></select></div><div class="bkpField"><label>Días inmutable</label><input type="number" formControlName="immutableDays"></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div><div class="bkpField full"><label>Config avanzada JSON</label><textarea formControlName="configJson"></textarea></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selected()" (click)="eliminar()"></button><button pButton type="submit" icon="pi pi-save" label="Guardar destino" [loading]="saving()"></button></div></form></section></section></div>
