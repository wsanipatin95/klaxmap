<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '42rem' }"
  header="Nuevo elemento"
  (onHide)="close()"
>
  <form class="dialog-body" [formGroup]="form" (ngSubmit)="guardar()">
    <div class="mini-summary">
      <span class="summary-chip">{{ geomLabel() }}</span>

      <span class="summary-chip" *ngIf="selectedNodo() as nodo">
        {{ nodo.nodo }}
      </span>

      <span class="summary-chip" *ngIf="selectedTipo() as tipo">
        {{ tipo.nombre }}
      </span>
    </div>

    <div class="form-grid two-cols">
      <div class="field">
        <label for="elemento-nodo">Nodo</label>
        <select id="elemento-nodo" formControlName="idRedNodoFk">
          <option [ngValue]="null">Seleccionar</option>
          <option *ngFor="let n of nodos" [ngValue]="n.idRedNodo">
            {{ n.nodo }}
          </option>
        </select>
        <p class="field-error" *ngIf="controlError('idRedNodoFk') as err">{{ err }}</p>
      </div>

      <div class="field">
        <label for="elemento-tipo">Tipo</label>
        <select
          id="elemento-tipo"
          formControlName="idGeoTipoElementoFk"
          (change)="onTipoChange()"
        >
          <option [ngValue]="null">Seleccionar</option>
          <option *ngFor="let t of tiposCompatibles()" [ngValue]="t.idGeoTipoElemento">
            {{ t.nombre }}
          </option>
        </select>
        <p class="field-error" *ngIf="controlError('idGeoTipoElementoFk') as err">{{ err }}</p>
      </div>
    </div>

    <div class="field">
      <label for="elemento-nombre">Nombre</label>
      <input
        id="elemento-nombre"
        type="text"
        formControlName="nombre"
        placeholder="Nombre"
      />
      <p class="field-error" *ngIf="controlError('nombre') as err">{{ err }}</p>
    </div>

    <div class="field">
      <label for="elemento-descripcion">Descripción</label>
      <textarea
        id="elemento-descripcion"
        formControlName="descripcion"
        placeholder="Descripción breve"
      ></textarea>
      <p class="field-error" *ngIf="controlError('descripcion') as err">{{ err }}</p>
    </div>

    <div class="form-grid two-cols">
      <div class="field">
        <label for="elemento-estado">Estado</label>
        <select id="elemento-estado" formControlName="estado">
          <option value="activo">Activo</option>
          <option value="planificado">Planificado</option>
          <option value="pendiente_clasificar">Pendiente</option>
        </select>
      </div>

      <div class="field">
        <label for="elemento-orden">Orden</label>
        <input id="elemento-orden" type="number" formControlName="ordenDibujo" />
        <p class="field-error" *ngIf="controlError('ordenDibujo') as err">{{ err }}</p>
      </div>
    </div>

    <label class="check-card">
      <input type="checkbox" formControlName="visible" />
      <span>Visible</span>
    </label>

    <div class="wkt-box">
      <div class="wkt-title">Geometría</div>
      <pre>{{ currentWkt() || 'Sin geometría' }}</pre>
    </div>

    <p class="error" *ngIf="error() as err">{{ err }}</p>
  </form>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button type="button" class="ghost-btn" (click)="close()">
        Cancelar
      </button>

      <button
        type="button"
        class="save-btn"
        [disabled]="form.invalid || !currentWkt()"
        (click)="guardar()"
      >
        Guardar
      </button>
    </div>
  </ng-template>
</p-dialog>
