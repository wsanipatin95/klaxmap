<p-confirmDialog></p-confirmDialog><div class="bkpPageShell"><app-bkp-page-header eyebrow="Seguridad" title="Secretos" subtitle="Claves, tokens y credenciales cifradas. El valor real nunca se muestra."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><section class="bkpToolbar"><div class="bkpSearchBox"><i class="pi pi-search"></i><input [value]="q()" (input)="q.set($any($event.target).value)" placeholder="Buscar secreto..." (keyup.enter)="cargar()"></div><button pButton type="button" label="Buscar" icon="pi pi-search" (click)="cargar()"></button></section><section class="bkpInfoStrip" *ngIf="loading()||saving()||dirty()||error()||success()"><span class="bkpNotice info" *ngIf="loading()">Cargando</span><span class="bkpNotice info" *ngIf="saving()">Guardando</span><span class="bkpNotice warn" *ngIf="dirty()">Cambios pendientes</span><span class="bkpNotice danger" *ngIf="error()">{{error()}}</span><span class="bkpNotice success" *ngIf="success()">{{success()}}</span></section><section class="bkpWorkbench"><aside class="bkpPanel pad"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>Secretos</h3><p>{{items().length}} registro(s)</p></div></div><div class="bkpList" *ngIf="items().length;else empty"><button type="button" class="bkpRow" *ngFor="let i of items()" [class.active]="selected()?.idBkpSecret===i.idBkpSecret" (click)="seleccionar(i)"><span><strong>{{i.nombre}}</strong><small>{{i.tipoSecret}} · {{i.algoritmo||'sin algoritmo'}}</small></span><span class="bkpBadge" [class.ok]="i.activo!==false">{{i.activo===false?'Inactivo':'Activo'}}</span></button></div><ng-template #empty><app-bkp-empty-state icon="pi pi-key" title="Sin secretos" subtitle="Crea credenciales cifradas para fuentes, destinos o cifrado."></app-bkp-empty-state></ng-template></aside><section class="bkpPanel pad"><form class="bkpForm" [formGroup]="form" (ngSubmit)="guardar()"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>{{selected()?'Editar secreto':'Nuevo secreto'}}</h3><p>Para rotar un secreto, ingresa nuevo valor y confirmación.</p></div></div><div class="bkpFormGrid"><div class="bkpField"><label>Nombre *</label><input formControlName="nombre"><span class="bkpError" *ngIf="invalid('nombre')">Requerido.</span></div><div class="bkpField"><label>Tipo *</label><select formControlName="tipoSecret"><option *ngFor="let t of secretTypes" [value]="t">{{t}}</option></select></div><div class="bkpField"><label>Algoritmo</label><input formControlName="algoritmo"></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div><div class="bkpField full"><label>Descripción</label><textarea formControlName="descripcion"></textarea></div><div class="bkpField"><label>{{selected()?'Nuevo valor':'Valor *'}}</label><input type="password" formControlName="valorPlano"></div><div class="bkpField"><label>Confirmar valor</label><input type="password" formControlName="confirmarValor"></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selected()" (click)="eliminar()"></button><button pButton type="submit" icon="pi pi-save" label="Guardar secreto" [loading]="saving()"></button></div></form></section></section></div>
