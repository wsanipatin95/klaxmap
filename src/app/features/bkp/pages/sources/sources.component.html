<p-confirmDialog></p-confirmDialog><div class="bkpPageShell"><app-bkp-page-header eyebrow="Origen" title="Bases origen" subtitle="Conexiones PostgreSQL/MySQL que serán respaldadas."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><section class="bkpToolbar"><div class="bkpSearchBox"><i class="pi pi-search"></i><input [value]="q()" (input)="q.set($any($event.target).value)" placeholder="Buscar origen..." (keyup.enter)="cargar()"></div><button pButton type="button" label="Buscar" icon="pi pi-search" (click)="cargar()"></button></section><section class="bkpInfoStrip" *ngIf="loading()||saving()||dirty()||error()||success()"><span class="bkpNotice info" *ngIf="loading()">Cargando</span><span class="bkpNotice info" *ngIf="saving()">Guardando</span><span class="bkpNotice warn" *ngIf="dirty()">Cambios pendientes</span><span class="bkpNotice danger" *ngIf="error()">{{error()}}</span><span class="bkpNotice success" *ngIf="success()">{{success()}}</span></section><section class="bkpWorkbench"><aside class="bkpPanel pad"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>Orígenes</h3><p>{{items().length}} registro(s)</p></div></div><div class="bkpList" *ngIf="items().length;else empty"><button class="bkpRow" type="button" *ngFor="let i of items()" [class.active]="selected()?.idBkpSourceDatabase===i.idBkpSourceDatabase" (click)="seleccionar(i)"><span><strong>{{i.nombre}}</strong><small>{{i.motor}} · {{i.host}}:{{i.puerto}}/{{i.nombreBase}}</small></span><span class="bkpBadge" [class.ok]="i.activo!==false">{{i.activo===false?'Inactivo':'Activo'}}</span></button></div><ng-template #empty><app-bkp-empty-state icon="pi pi-database" title="Sin orígenes" subtitle="Registra la base a respaldar."></app-bkp-empty-state></ng-template></aside><section class="bkpPanel pad"><form class="bkpForm" [formGroup]="form" (ngSubmit)="guardar()"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>{{selected()?'Editar origen':'Nuevo origen'}}</h3><p>Usa secretos cifrados para la contraseña de conexión.</p></div></div><div class="bkpFormGrid"><div class="bkpField"><label>Nombre *</label><input formControlName="nombre"></div><div class="bkpField"><label>Motor *</label><select formControlName="motor"><option *ngFor="let m of motores()" [value]="m">{{m}}</option></select></div><div class="bkpField"><label>Host *</label><input formControlName="host"></div><div class="bkpField"><label>Puerto *</label><input type="number" formControlName="puerto"></div><div class="bkpField"><label>Base *</label><input formControlName="nombreBase"></div><div class="bkpField"><label>Schema</label><input formControlName="nombreSchema"></div><div class="bkpField"><label>Usuario *</label><input formControlName="usuario"></div><div class="bkpField"><label>Secreto password</label><select formControlName="idBkpSecretPasswordFk"><option [ngValue]="null">Sin secreto</option><option *ngFor="let s of secrets()" [ngValue]="s.idBkpSecret">{{s.nombre}} · {{s.tipoSecret}}</option></select></div><div class="bkpField"><label>SSL</label><select formControlName="sslEnabled"><option [ngValue]="false">No</option><option [ngValue]="true">Sí</option></select></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div><div class="bkpField full"><label>Parámetros avanzados JSON</label><textarea formControlName="connectionParamsJson"></textarea></div><div class="bkpField full"><label>Observación</label><textarea formControlName="observacion"></textarea></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selected()" (click)="eliminar()"></button><button pButton type="submit" icon="pi pi-save" label="Guardar origen" [loading]="saving()"></button></div></form></section></section></div>
