<div class="properties-shell" [class.open]="open">
  <div class="properties-overlay" *ngIf="open" (click)="onOverlayClick()"></div>

  <aside class="properties-drawer" [class.open]="open" (click)="onPanelClick($event)">
    <div class="panel-save-blocker" *ngIf="saving()">
      <div class="panel-save-card">
        <div class="panel-save-title">Guardando cambios...</div>
        <div class="panel-save-text">Espera un momento mientras se actualiza la información.</div>
      </div>
    </div>

    <ng-container *ngIf="elemento; else emptyState">
      <div class="panel-header">
        <div class="panel-title-wrap">
          <div class="title-row">
            <h3 [title]="elemento.nombre">{{ elemento.nombre }}</h3>
            <span class="dirty-badge" *ngIf="dirty()">Sin guardar</span>
          </div>

          <small>{{ elemento.geomTipo }} · {{ elemento.estado }}</small>
        </div>

        <div class="panel-actions">
          <button
            type="button"
            class="close-btn"
            aria-label="Cerrar panel"
            [disabled]="saving()"
            (click)="requestClose()"
          >
            ×
          </button>

          <button
            type="button"
            class="delete-btn"
            [disabled]="saving()"
            (click)="eliminar()"
          >
            Eliminar
          </button>
        </div>
      </div>

      <div
        class="panel-status"
        *ngIf="statusMessage() as message"
        [class.is-success]="statusKind() === 'success'"
        [class.is-error]="statusKind() === 'error'"
      >
        {{ message }}
      </div>

      <div class="panel-body">
        <app-mapa-properties-tabs
          [elemento]="elemento"
          [tipos]="tipos"
          [nodos]="nodos"
          [saving]="saving()"
          (submitted)="guardar($event)"
          (dirtyChange)="onDirtyStateChanged($event)"
        />
      </div>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        Selecciona un elemento.
      </div>
    </ng-template>
  </aside>
</div>
