<p-confirmDialog></p-confirmDialog><div class="bkpPageShell"><app-bkp-page-header eyebrow="Automatización" title="Horarios" subtitle="Frecuencias automáticas para planes de backup."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><section class="bkpToolbar"><div class="bkpSearchBox"><i class="pi pi-search"></i><input [value]="q()" (input)="q.set($any($event.target).value)" placeholder="Buscar horario..." (keyup.enter)="cargar()"></div><button pButton type="button" label="Buscar" icon="pi pi-search" (click)="cargar()"></button></section><section class="bkpInfoStrip" *ngIf="loading()||saving()||dirty()||error()||success()"><span class="bkpNotice info" *ngIf="loading()">Cargando</span><span class="bkpNotice info" *ngIf="saving()">Guardando</span><span class="bkpNotice warn" *ngIf="dirty()">Cambios pendientes</span><span class="bkpNotice danger" *ngIf="error()">{{error()}}</span><span class="bkpNotice success" *ngIf="success()">{{success()}}</span></section><section class="bkpWorkbench"><aside class="bkpPanel pad"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>Horarios</h3><p>{{items().length}} registro(s)</p></div></div><div class="bkpList" *ngIf="items().length;else empty"><button class="bkpRow" type="button" *ngFor="let i of items()" [class.active]="selected()?.idBkpSchedule===i.idBkpSchedule" (click)="seleccionar(i)"><span><strong>{{i.nombre}}</strong><small>{{i.tipoSchedule}} · {{i.timezone}}</small></span><span class="bkpBadge" [class.ok]="i.activo!==false">{{i.activo===false?'Inactivo':'Activo'}}</span></button></div><ng-template #empty><app-bkp-empty-state icon="pi pi-clock" title="Sin horarios" subtitle="Puedes ejecutar manualmente, pero un horario permite automatizar."></app-bkp-empty-state></ng-template></aside><section class="bkpPanel pad"><form class="bkpForm" [formGroup]="form" (ngSubmit)="guardar()"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>{{selected()?'Editar horario':'Nuevo horario'}}</h3><p>Configura frecuencia y zona horaria.</p></div></div><div class="bkpFormGrid"><div class="bkpField"><label>Nombre *</label><input formControlName="nombre"></div><div class="bkpField"><label>Tipo *</label><select formControlName="tipoSchedule"><option *ngFor="let t of scheduleTypes()" [value]="t">{{t}}</option></select></div><div class="bkpField full" *ngIf="form.value.tipoSchedule==='CRON'"><label>Cron *</label><input formControlName="cronExpression"></div><div class="bkpField" *ngIf="form.value.tipoSchedule==='INTERVAL'"><label>Intervalo minutos *</label><input type="number" formControlName="intervalMinutes"></div><div class="bkpField"><label>Hora</label><input type="number" formControlName="hora"></div><div class="bkpField"><label>Minuto</label><input type="number" formControlName="minuto"></div><div class="bkpField" *ngIf="form.value.tipoSchedule==='WEEKLY'"><label>Días semana</label><input formControlName="diasSemana"></div><div class="bkpField" *ngIf="form.value.tipoSchedule==='MONTHLY'"><label>Día mes</label><input type="number" formControlName="diaMes"></div><div class="bkpField"><label>Timezone *</label><input formControlName="timezone"></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selected()" (click)="eliminar()"></button><button pButton type="submit" icon="pi pi-save" label="Guardar horario" [loading]="saving()"></button></div></form></section></section></div>
