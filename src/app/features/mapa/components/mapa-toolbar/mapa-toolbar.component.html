<div class="ge-toolbar-shell">
  <div class="ge-toolbar-strip" role="toolbar" aria-label="Herramientas del mapa">
    <button
      type="button"
      class="tool-btn"
      [class.active]="!sidebarHidden"
      [attr.title]="sidebarToggleTitle()"
      [attr.aria-label]="sidebarToggleTitle()"
      (click)="sidebarToggleRequested.emit()"
    >
      <i
        class="pi"
        [class.pi-bars]="sidebarHidden"
        [class.pi-times]="!sidebarHidden"
        aria-hidden="true"
      ></i>
    </button>

    <button
      type="button"
      class="tool-btn"
      [class.active]="sidebarCompact && !sidebarHidden"
      [disabled]="sidebarHidden"
      [attr.title]="sidebarCompactTitle()"
      [attr.aria-label]="sidebarCompactTitle()"
      (click)="sidebarCompactRequested.emit()"
    >
      <i
        class="pi"
        [class.pi-angle-double-left]="!sidebarCompact"
        [class.pi-angle-double-right]="sidebarCompact"
        aria-hidden="true"
      ></i>
    </button>

    <span class="tool-separator" aria-hidden="true"></span>

    <button
      type="button"
      class="tool-btn"
      [class.active]="isActive('select')"
      title="Seleccionar elementos"
      aria-label="Seleccionar elementos"
      (click)="selectModeRequested.emit()"
    >
      <i class="pi pi-mouse-pointer"></i>
    </button>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('edit-geometry') || editSessionActive"
      title="Editar forma"
      aria-label="Editar forma"
      (click)="editGeometryModeRequested.emit()"
    >
      <i class="pi pi-pencil"></i>
    </button>

    <span class="tool-separator" aria-hidden="true"></span>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('draw-point')"
      title="Crear punto"
      aria-label="Crear punto"
      (click)="drawPointModeRequested.emit()"
    >
      <i class="pi pi-map-marker"></i>
    </button>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('draw-line')"
      title="Crear línea"
      aria-label="Crear línea"
      (click)="drawLineModeRequested.emit()"
    >
      <i class="pi pi-minus"></i>
    </button>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('draw-polygon')"
      title="Crear polígono"
      aria-label="Crear polígono"
      (click)="drawPolygonModeRequested.emit()"
    >
      <i class="pi pi-stop"></i>
    </button>

    <button
      type="button"
      class="tool-btn"
      [class.active]="isActive('measure')"
      title="Medir distancias"
      aria-label="Medir distancias"
      (click)="measureModeRequested.emit()"
    >
      <span class="tool-btn-glyph" aria-hidden="true">📏</span>
    </button>

    <button
      type="button"
      class="tool-btn"
      [class.active]="locatingMyPosition"
      [disabled]="locatingMyPosition"
      [attr.title]="myLocationTitle"
      [attr.aria-label]="myLocationTitle"
      (click)="onMyLocationRequested()"
    >
      <i class="pi pi-compass"></i>
    </button>

    <div class="toolbar-dropdown" (click)="$event.stopPropagation()">
      <button
        type="button"
        class="tool-btn tool-btn--wide tool-btn--dropdown"
        [class.active]="basemapMenuOpen"
        [attr.title]="'Mapa base: ' + basemapLabel"
        [attr.aria-label]="'Mapa base: ' + basemapLabel"
        (click)="toggleBasemapMenu($event)"
      >
        <i class="pi pi-map"></i>
        <span class="tool-btn-label">{{ basemapLabel }}</span>
        <i class="pi pi-angle-down tool-btn-dropdown-icon" [class.is-open]="basemapMenuOpen"></i>
      </button>

      <div class="toolbar-dropdown-menu" *ngIf="basemapMenuOpen">
        <button
          type="button"
          class="toolbar-dropdown-item"
          *ngFor="let option of basemapOptions"
          [class.active]="option.key === basemap"
          (click)="selectBasemap(option.key, $event)"
        >
          <span class="toolbar-dropdown-item-text">{{ option.label }}</span>
          <i class="pi pi-check" *ngIf="option.key === basemap"></i>
        </button>
      </div>
    </div>

    <button
      type="button"
      class="tool-btn tool-btn--wide"
      [class.active]="labelsVisible"
      [attr.title]="labelsTitle"
      [attr.aria-label]="labelsTitle"
      [attr.aria-pressed]="labelsVisible"
      (click)="onLabelsToggle()"
    >
      <i class="pi pi-eye"></i>
    </button>

    <span class="tool-separator" aria-hidden="true"></span>

    <button
      *ngIf="editarTipoElemento()"
      type="button"
      class="tool-btn"
      title="Tipos de elemento"
      aria-label="Tipos de elemento"
      (click)="manageTiposRequested.emit()"
    >
      <i class="pi pi-sitemap"></i>
    </button>

    <button
      *ngIf="editarTipoElemento()"
      type="button"
      class="tool-btn"
      title="Importar KML"
      aria-label="Importar KML"
      (click)="importRequested.emit()"
    >
      <i class="pi pi-upload"></i>
    </button>

    <button
      *ngIf="editarTipoElemento()"
      type="button"
      class="tool-btn"
      title="Exportar KML"
      aria-label="Exportar KML"
      (click)="exportRequested.emit()"
    >
      <i class="pi pi-download"></i>
    </button>

    <button
      type="button"
      class="tool-btn"
      title="Refrescar"
      aria-label="Refrescar"
      (click)="refreshRequested.emit()"
    >
      <i class="pi pi-refresh"></i>
    </button>
  </div>

  <div class="edit-strip" *ngIf="editSessionActive">
    <div class="edit-strip-copy">
      <strong>{{ editSessionElementName || 'Elemento' }}</strong>
      <span>
        {{
          editSessionDirty
            ? 'Hay cambios pendientes.'
            : 'Edición activa.'
        }}
      </span>
    </div>

    <div class="edit-strip-actions">
      <button
        type="button"
        class="edit-action"
        (click)="cancelEditRequested.emit()"
      >
        <i class="pi pi-times"></i>
        <span>Cancelar</span>
      </button>

      <button
        type="button"
        class="edit-action edit-action--primary"
        [disabled]="!editSessionDirty"
        (click)="saveEditRequested.emit()"
      >
        <i class="pi pi-check"></i>
        <span>Guardar</span>
      </button>
    </div>
  </div>
</div>
