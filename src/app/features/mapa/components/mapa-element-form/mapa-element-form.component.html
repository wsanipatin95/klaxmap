<div class="element-form-shell" *ngIf="elemento as el">
  <div class="mini-summary">
    <span class="summary-chip">
      Registro: #{{ el.idGeoElemento }}
    </span>

    <span class="summary-chip">
      Geometría: {{ geomDisplayLabel() }}
    </span>

    <span
      class="summary-chip"
      [class.is-active]="!isDeleted()"
      [class.is-deleted]="isDeleted()"
    >
      Estado: {{ logicalStateLabel() }}
    </span>
  </div>

  <form class="element-form" (ngSubmit)="guardar()">
    <div class="form-grid top-row">
      <div class="field field-node">
        <label for="elemento-nodo-edit">Nodo</label>

        <p-select
          id="elemento-nodo-edit"
          class="node-select"
          [(ngModel)]="form.idRedNodoFk"
          [options]="nodeOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Buscar y seleccionar nodo"
          [filter]="true"
          filterBy="label"
          filterPlaceholder="Buscar nodo..."
          [showClear]="true"
          [appendTo]="'body'"
          [emptyMessage]="'No hay nodos disponibles'"
          [disabled]="saving || actionBusy()"
          name="idRedNodoFk"
          (ngModelChange)="onFieldChanged()"
        >
        </p-select>

        <p class="field-error" *ngIf="controlError('idRedNodoFk') as err">{{ err }}</p>
      </div>

      <div class="field field-name">
        <label for="elemento-nombre-edit">Nombre</label>
        <input
          id="elemento-nombre-edit"
          type="text"
          [(ngModel)]="form.nombre"
          name="nombre"
          placeholder="Nombre"
          [disabled]="saving || actionBusy()"
          (ngModelChange)="onFieldChanged()"
        />
        <p class="field-error" *ngIf="controlError('nombre') as err">{{ err }}</p>
      </div>
    </div>

    <div class="field">
      <label for="elemento-descripcion-edit">Descripción</label>
      <textarea
        id="elemento-descripcion-edit"
        rows="2"
        [(ngModel)]="form.descripcion"
        name="descripcion"
        placeholder="Descripción breve"
        [disabled]="saving || actionBusy()"
        (ngModelChange)="onFieldChanged()"
      ></textarea>
      <p class="field-error" *ngIf="controlError('descripcion') as err">{{ err }}</p>
    </div>

    <div class="field">
      <label>Tipo</label>

      <div class="tipo-groups" *ngIf="tiposAgrupados.length; else noTiposCompatibles">
        <section class="tipo-group" *ngFor="let group of tiposAgrupados; trackBy: trackByGrupo">
          <div class="tipo-group-title">{{ group.agrupacion }}</div>

          <div class="tipo-options">
            <label
              class="tipo-option"
              *ngFor="let tipo of group.tipos; trackBy: trackByTipo"
              [class.active]="isTipoSelected(tipo)"
            >
              <input
                type="radio"
                name="idGeoTipoElementoFk"
                [checked]="isTipoSelected(tipo)"
                [disabled]="saving || actionBusy()"
                (change)="onTipoPicked(tipo.idGeoTipoElemento)"
              />

              <span class="tipo-option-preview">
                <span
                  class="tipo-preview-shape"
                  [ngClass]="previewShapeClass(tipo)"
                  [ngStyle]="previewStyle(tipo)"
                >
                  <span
                    *ngIf="showMaterialPreview(tipo)"
                    class="tipo-preview-material"
                    [class]="previewMaterialFamily(tipo)"
                  >
                    {{ previewMaterialGlyph(tipo) }}
                  </span>

                  <i
                    *ngIf="showClassPreview(tipo)"
                    class="tipo-preview-class"
                    [class]="previewClass(tipo)"
                  ></i>

                  <img
                    *ngIf="showUrlPreview(tipo)"
                    class="tipo-preview-image"
                    [src]="previewImageUrl(tipo)"
                    alt=""
                  />
                </span>
              </span>

              <span class="tipo-option-name">{{ tipo.nombre }}</span>
            </label>
          </div>
        </section>
      </div>

      <ng-template #noTiposCompatibles>
        <div class="empty-state">
          No hay tipos compatibles con la geometría actual.
        </div>
      </ng-template>

      <p class="field-error" *ngIf="controlError('idGeoTipoElementoFk') as err">{{ err }}</p>
    </div>

    <p class="success" *ngIf="successMessage as ok">{{ ok }}</p>
    <p class="error" *ngIf="error as err">{{ err }}</p>

    <div class="actions">
      <div class="actions-left">
        <button
          type="button"
          class="state-btn"
          [class.state-btn--delete]="!isDeleted()"
          [class.state-btn--restore]="isDeleted()"
          [disabled]="saving || actionBusy()"
          (click)="requestStateAction()"
        >
          {{ isDeleted() ? 'Restaurar registro' : 'Eliminar registro' }}
        </button>
      </div>

      <div class="actions-right">
        <button
          type="button"
          class="ghost-btn"
          [disabled]="saving || actionBusy() || !hasUnsavedChanges()"
          (click)="discardChanges()"
        >
          Revertir cambios
        </button>

        <button
          type="submit"
          class="save-btn"
          [disabled]="saving || actionBusy() || !hasUnsavedChanges()"
        >
          {{ saving || actionBusy() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </div>
  </form>
</div>

<app-mapa-confirm-dialog #confirmDialog></app-mapa-confirm-dialog>
