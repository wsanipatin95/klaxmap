<div class="overlay" *ngIf="visible" (click)="close()">
  <div
    class="context-wrap"
    *ngIf="elemento as e"
    [style.left.px]="x"
    [style.top.px]="y"
    (click)="$event.stopPropagation()"
  >
    <div class="context-header">
      <div class="context-title" [title]="e.nombre">{{ e.nombre }}</div>
      <div class="context-subtitle">
        {{ geomLabel(e.geomTipo) }} · {{ estadoLabel(e.estado) }}
      </div>
    </div>

    <div class="context-actions">
      <button *ngIf="editarElemento()" type="button" class="menu-btn menu-btn--primary" (click)="onEditData(e)">
        Editar datos
      </button>

      <button type="button" class="menu-btn" (click)="onAudit(e)">
        Auditoría
      </button>

      <button *ngIf="editarElemento()" type="button" class="menu-btn" (click)="onEditGeometry(e)">
        Editar forma
      </button>

      <button type="button" class="menu-btn" (click)="onCenter(e)">
        Centrar en mapa
      </button>

      <button *ngIf="editarElemento()" type="button" class="menu-btn menu-btn--danger" (click)="onDelete(e)">
        Eliminar
      </button>
    </div>
  </div>
</div>
