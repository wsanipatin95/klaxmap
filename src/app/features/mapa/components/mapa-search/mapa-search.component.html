<div class="ge-search">
  <button
    type="button"
    class="search-icon"
    [attr.title]="loading ? 'Buscando...' : 'Buscar'"
    [attr.aria-label]="loading ? 'Buscando...' : 'Buscar'"
  >
    <i class="pi" [ngClass]="loading ? 'pi-spin pi-spinner' : 'pi-search'"></i>
  </button>

  <input
    type="text"
    [ngModel]="value"
    (ngModelChange)="onInput($event)"
    [placeholder]="placeholder"
    autocomplete="off"
    spellcheck="false"
  />

  <button
    type="button"
    class="nav-btn"
    title="Resultado anterior"
    aria-label="Resultado anterior"
    [disabled]="resultCount <= 1"
    (click)="prevRequested.emit()"
  >
    <i class="pi pi-angle-up"></i>
  </button>

  <button
    type="button"
    class="nav-btn"
    title="Resultado siguiente"
    aria-label="Resultado siguiente"
    [disabled]="resultCount <= 1"
    (click)="nextRequested.emit()"
  >
    <i class="pi pi-angle-down"></i>
  </button>

  <button
    type="button"
    class="clear-btn"
    title="Limpiar búsqueda"
    aria-label="Limpiar búsqueda"
    [disabled]="!value"
    (click)="clear()"
  >
    <i class="pi pi-times"></i>
  </button>
</div>

<div class="ge-search-status">
  {{ loading ? 'Buscando…' : counterLabel }}
</div>
