<p-confirmDialog></p-confirmDialog><div class="bkpPageShell"><app-bkp-page-header eyebrow="Parámetros" title="Configuración BKP" subtitle="Valores generales de retención, timezone, notificación y concurrencia."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><section class="bkpInfoStrip" *ngIf="loading()||saving()||dirty()||error()||success()"><span class="bkpNotice info" *ngIf="loading()">Cargando</span><span class="bkpNotice info" *ngIf="saving()">Guardando</span><span class="bkpNotice warn" *ngIf="dirty()">Cambios pendientes</span><span class="bkpNotice danger" *ngIf="error()">{{error()}}</span><span class="bkpNotice success" *ngIf="success()">{{success()}}</span></section><section class="bkpPanel pad"><form class="bkpForm" [formGroup]="form" (ngSubmit)="guardar()"><div class="bkpFormGrid"><div class="bkpField"><label>Empresa</label><input formControlName="companyName"></div><div class="bkpField"><label>Responsable</label><input formControlName="responsibleName"></div><div class="bkpField"><label>Timezone *</label><input formControlName="defaultTimezone"></div><div class="bkpField"><label>Retención default *</label><input type="number" formControlName="defaultRetentionDays"></div><div class="bkpField"><label>Notificar éxito</label><select formControlName="notifyOnSuccess"><option [ngValue]="true">Sí</option><option [ngValue]="false">No</option></select></div><div class="bkpField"><label>Notificar error</label><select formControlName="notifyOnError"><option [ngValue]="true">Sí</option><option [ngValue]="false">No</option></select></div><div class="bkpField"><label>Backups paralelos *</label><input type="number" formControlName="maxParallelBackups"></div><div class="bkpField"><label>Temp path default</label><input formControlName="defaultLocalTempPath"></div><div class="bkpField full"><label>Config JSON avanzada</label><textarea formControlName="configJson"></textarea></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div></div><div class="bkpActions"><button pButton type="submit" icon="pi pi-save" label="Guardar configuración" [loading]="saving()"></button></div></form></section></div>
