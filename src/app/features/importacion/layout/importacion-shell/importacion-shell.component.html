<div class="imp-shell">
  <div class="imp-shell__tabs">
    <!-- Usamos el valor numérico directamente del Signal -->
    <p-tabs [value]="activeIndex()" (valueChange)="go($event)">
      <p-tablist>
        <!-- El [value] de cada tab ahora es el índice 'i' (number) -->
        <p-tab *ngFor="let tab of tabs; let i = index" [value]="i">
          <i [class]="tab.icon"></i>
          <span>{{ tab.label }}</span>
        </p-tab>
      </p-tablist>
    </p-tabs>
  </div>

  <div class="imp-shell__content">
    <router-outlet></router-outlet>
  </div>

  <ngx-sonner-toaster position="top-right" richColors></ngx-sonner-toaster>
</div>
