<div class="tree-empty" *ngIf="!hasAnyTreeData">
  <span>No hay elementos.</span>
</div>

<div class="tree-empty" *ngIf="hasAnyTreeData && !hasVisibleTreeData">
  <span>Sin resultados.</span>
</div>

<div class="tree-performance-note" *ngIf="performanceNotice">
  {{ performanceNotice }}
</div>

<div class="tree-scroll" *ngIf="hasVisibleTreeData">
  <ul class="tree-root">
    <ng-container *ngFor="let item of tree; trackBy: trackByNode">
      <ng-container
        *ngTemplateOutlet="nodeTpl; context: { $implicit: item, level: 0 }"
      ></ng-container>
    </ng-container>
  </ul>
</div>

<ng-template #nodeTpl let-item let-level="level">
  <li class="tree-node" *ngIf="item.visible">
    <div
      class="node-row"
      [class.active]="item.node.idRedNodo === selectedNodoId"
      [class.is-hidden]="!isNodeVisible(item.node)"
      [style.paddingLeft.px]="4 + (level * 12)"
      (click)="onNodeClick(item.node, $event)"
      (contextmenu)="openNodeContext(item.node, $event)"
      [attr.title]="item.node.nodo"
    >
      <button
        type="button"
        class="expand-btn"
        *ngIf="item.children.length > 0 || item.elementos.length > 0 || item.hiddenElementCount > 0"
        (click)="toggleExpanded(item.node.idRedNodo, $event)"
        aria-label="Expandir o contraer nodo"
      >
        <span class="expand-chevron" [class.expanded]="isExpanded(item.node)">▸</span>
      </button>

      <span
        class="expand-placeholder"
        *ngIf="item.children.length === 0 && item.elementos.length === 0 && item.hiddenElementCount === 0"
      ></span>

      <input
        type="checkbox"
        class="tree-check"
        [checked]="isNodeVisible(item.node)"
        [indeterminate]="isNodeIndeterminate(item.node)"
        (click)="$event.stopPropagation()"
        (change)="onToggleNode(item.node, $event)"
      />

      <span
        class="node-preview"
        [ngClass]="previewShapeClassForNode(item.node)"
        aria-hidden="true"
      ></span>

      <span class="node-name">{{ item.node.nodo }}</span>
    </div>

    <ul class="tree-children" *ngIf="isExpanded(item.node)">
      <ng-container *ngFor="let child of item.children; trackBy: trackByNode">
        <ng-container
          *ngTemplateOutlet="nodeTpl; context: { $implicit: child, level: level + 1 }"
        ></ng-container>
      </ng-container>

      <li
        class="element-row"
        *ngFor="let el of item.elementos; trackBy: trackByElemento"
        [class.active]="el.idGeoElemento === selectedElementoId"
        [class.is-hidden]="!isElementoVisible(el)"
        [style.paddingLeft.px]="26 + ((level + 1) * 12)"
        (click)="onElementoClick(el, $event)"
        (contextmenu)="openElementoContext(el, $event)"
        [attr.title]="el.nombre"
      >
        <div class="element-row-grid">
          <input
            type="checkbox"
            class="tree-check"
            [checked]="isElementoVisible(el)"
            (click)="$event.stopPropagation()"
            (change)="onToggleElemento(el, $event)"
          />

          <span
            class="element-preview"
            [ngClass]="previewShapeClassForElemento(el)"
            [ngStyle]="previewStyleForElemento(el)"
            aria-hidden="true"
          >
            <ng-container *ngIf="showMaterialPreviewForElemento(el)">
              <span
                class="element-preview-material"
                [class]="previewMaterialFamilyForElemento(el)"
              >
                {{ previewMaterialGlyphForElemento(el) }}
              </span>
            </ng-container>

            <ng-container *ngIf="showClassPreviewForElemento(el)">
              <i class="element-preview-class" [class]="previewClassForElemento(el)"></i>
            </ng-container>

            <ng-container *ngIf="showUrlPreviewForElemento(el)">
              <img
                class="element-preview-image"
                [src]="previewImageUrlForElemento(el)"
                alt=""
              />
            </ng-container>
          </span>

          <span class="element-name">{{ el.nombre }}</span>
        </div>
      </li>

      <li
        class="element-row element-row-overflow"
        *ngIf="item.hiddenElementCount > 0"
        [style.paddingLeft.px]="26 + ((level + 1) * 12)"
        [attr.title]="nodeOverflowLabel(item)"
      >
        <div class="element-row-grid">
          <span class="element-preview is-point" aria-hidden="true"></span>
          <span class="element-name">{{ nodeOverflowLabel(item) }}</span>
        </div>
      </li>
    </ul>
  </li>
</ng-template>

<div class="context-overlay" *ngIf="contextVisible()" (click)="closeContext()">
  <div
    class="context-menu"
    [style.left.px]="contextX()"
    [style.top.px]="contextY()"
    (click)="$event.stopPropagation()"
  >
    <ng-container *ngIf="contextKind() === 'node' && contextNode() as node">
      <div class="context-title">{{ node.nodo }}</div>

      <button type="button" (click)="createNodeRequested.emit({ parent: node, tipo: 'carpeta' }); closeContext()">
        Crear carpeta
      </button>
      <button type="button" (click)="createNodeRequested.emit({ parent: node, tipo: 'zona' }); closeContext()">
        Crear zona
      </button>
      <button type="button" (click)="createNodeRequested.emit({ parent: node, tipo: 'sitio' }); closeContext()">
        Crear sitio
      </button>
      <button type="button" (click)="createNodeRequested.emit({ parent: node, tipo: 'nodo_fisico' }); closeContext()">
        Crear nodo físico
      </button>

      <div class="context-divider"></div>

      <button type="button" (click)="drawElementRequested.emit({ node, geomTipo: 'point' }); closeContext()">
        Dibujar punto aquí
      </button>
      <button type="button" (click)="drawElementRequested.emit({ node, geomTipo: 'linestring' }); closeContext()">
        Dibujar línea aquí
      </button>
      <button type="button" (click)="drawElementRequested.emit({ node, geomTipo: 'polygon' }); closeContext()">
        Dibujar polígono aquí
      </button>

      <div class="context-divider"></div>

      <button type="button" (click)="editNodeRequested.emit(node); closeContext()">
        Editar nodo
      </button>
      <button type="button" class="danger" (click)="deleteNodeRequested.emit(node); closeContext()">
        Eliminar nodo
      </button>
    </ng-container>

    <ng-container *ngIf="contextKind() === 'element' && contextElemento() as el">
      <div class="context-title">{{ el.nombre }}</div>

      <button type="button" (click)="elementoSelected.emit(el); closeContext()">
        Seleccionar
      </button>
      <button type="button" (click)="centerElementoRequested.emit(el); closeContext()">
        Centrar en mapa
      </button>
      <button type="button" (click)="editDataElementoRequested.emit(el); closeContext()">
        Editar datos
      </button>
      <button type="button" (click)="editGeometryElementoRequested.emit(el); closeContext()">
        Editar forma
      </button>
      <button type="button" class="danger" (click)="deleteElementoRequested.emit(el); closeContext()">
        Eliminar
      </button>
    </ng-container>
  </div>
</div>
