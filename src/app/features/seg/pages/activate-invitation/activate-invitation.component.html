<!-- FULLSCREEN BLOCKER -->
<div *ngIf="state === 'loading' || state === 'checking'"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[1px]" aria-live="polite"
    aria-busy="true">
    <div class="bg-white rounded-2xl shadow-2xl px-6 py-5 w-[320px]">
        <div class="flex items-center gap-3">
            <i class="pi pi-spin pi-spinner text-xl"></i>
            <div class="leading-tight">
                <div class="font-semibold">
                    {{ state === 'checking' ? 'Validando…' : 'Procesando…' }}
                </div>
                <div class="text-xs text-gray-500">Por favor espera.</div>
            </div>
        </div>
        <div class="mt-4 h-1 w-full bg-gray-100 rounded">
            <div class="h-1 w-1/2 bg-gray-900/50 rounded animate-pulse"></div>
        </div>
    </div>
</div>

<div
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-50 via-primary-100 to-primary-200 p-4 py-6">
    <div class="w-full max-w-md">
        <p-card styleClass="shadow-2xl">
            <ng-template pTemplate="header">
                <div class="flex flex-col items-center pt-8 pb-4">
                    <div class="rounded-full p-4 mb-4 shadow-lg" [ngClass]="{
              'bg-primary-500': state === 'checking' || state === 'loading' || state === 'form',
              'bg-green-500': state === 'success',
              'bg-red-500': state === 'error'
            }">
                        <i class="pi text-4xl text-white" [ngClass]="{
                'pi-spinner pi-spin': state === 'checking' || state === 'loading',
                'pi-user-plus': state === 'form',
                'pi-check': state === 'success',
                'pi-times': state === 'error'
              }"></i>
                    </div>

                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Invitación</h1>
                    <p class="text-gray-600 text-center px-4 text-sm">
                        {{ message }}
                    </p>

                    <p *ngIf="email && state === 'success'" class="text-xs text-gray-500 mt-2">
                        Cuenta: {{ email }}
                    </p>
                </div>
            </ng-template>

            <!-- FORM modo 0 -->
            <form *ngIf="state === 'form' && modo === 0" [formGroup]="form" (ngSubmit)="submitModo0()"
                class="space-y-4 px-4 pb-4">
                <div>
                    <label class="text-sm font-semibold text-gray-700">Representante</label>
                    <input pInputText formControlName="representante" class="w-full mt-2" />
                    <small *ngIf="representante?.invalid && representante?.touched" class="text-red-500 text-xs">
                        Representante requerido (mínimo 2 caracteres)
                    </small>
                </div>

                <div>
                    <label class="text-sm font-semibold text-gray-700">Móvil</label>
                    <input pInputText formControlName="movil" class="w-full mt-2" placeholder="Ej: 0960025142" />
                    <small *ngIf="movil?.invalid && movil?.touched" class="text-red-500 text-xs">
                        Móvil inválido (7 a 15 dígitos)
                    </small>
                </div>

                <div>
                    <label class="text-sm font-semibold text-gray-700">Clave</label>
                    <p-password formControlName="clave" [toggleMask]="true" [feedback]="true" styleClass="w-full mt-2"
                        inputStyleClass="w-full"></p-password>
                    <small *ngIf="clave?.invalid && clave?.touched" class="text-red-500 text-xs">
                        Mínimo 6 caracteres
                    </small>
                </div>

                <div>
                    <label class="text-sm font-semibold text-gray-700">Confirmar clave</label>
                    <p-password formControlName="confirmClave" [toggleMask]="true" [feedback]="false"
                        styleClass="w-full mt-2" inputStyleClass="w-full"></p-password>

                    <small *ngIf="form.errors?.['passwordMismatch'] && confirmClave?.touched"
                        class="text-red-500 text-xs">
                        Las claves no coinciden
                    </small>
                </div>

                <button pButton type="submit" label="Activar cuenta" icon="pi pi-check" [loading]="loading"
                    [disabled]="loading" class="w-full"></button>

                <div class="text-center pt-3 border-t border-gray-200">
                    <p class="text-gray-600 text-sm">
                        ¿Ya tienes una cuenta?
                        <a routerLink="/login" [class.pointer-events-none]="loading" [class.opacity-60]="loading"
                            class="text-primary-600 font-semibold hover:underline ml-1">
                            Inicia sesión aquí
                        </a>
                    </p>
                </div>
            </form>

            <!-- SUCCESS / ERROR buttons -->
            <div *ngIf="state === 'success' || state === 'error'" class="px-4 pb-6 space-y-3">
                <button *ngIf="state === 'success'" pButton type="button" label="Ir a Iniciar Sesión"
                    icon="pi pi-sign-in" class="w-full" (click)="goLogin()"></button>

                <button *ngIf="state === 'error'" pButton type="button" label="Volver a Registro" icon="pi pi-user-plus"
                    class="w-full" styleClass="p-button-outlined" (click)="goRegister()"></button>

                <button *ngIf="state === 'error'" pButton type="button" label="Ir a Iniciar Sesión" icon="pi pi-sign-in"
                    class="w-full" (click)="goLogin()"></button>
            </div>
        </p-card>
    </div>
</div>
