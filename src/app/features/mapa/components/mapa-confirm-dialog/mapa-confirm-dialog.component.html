<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: '28rem' }"
  [header]="title()"
  (onHide)="onHide()"
>
  <div class="confirm-body">
    <div class="confirm-icon" [class]="severityClass()">
      {{ iconSymbol() }}
    </div>

    <div class="confirm-content">
      <div class="confirm-title">{{ title() }}</div>
      <p class="confirm-message">{{ message() }}</p>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button type="button" class="ghost-btn" (click)="cancel()">
        {{ cancelLabel() }}
      </button>

      <button
        *ngIf="alternateLabel() as altLabel"
        type="button"
        class="alternate-btn"
        (click)="alternate()"
      >
        {{ altLabel }}
      </button>

      <button
        type="button"
        class="confirm-btn"
        [class.is-danger]="severity() === 'danger'"
        [class.is-warning]="severity() === 'warning'"
        [class.is-info]="severity() === 'info'"
        (click)="confirm()"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </ng-template>
</p-dialog>
