<div class="mapa-canvas-shell">
  <div class="mapa-basemap-control">
    <button
      type="button"
      class="mapa-basemap-trigger"
      (click)="toggleBasemapMenu()"
    >
      <span class="mapa-basemap-trigger-label">{{ currentBasemapLabel() }}</span>
      <span class="mapa-basemap-trigger-icon">{{ basemapMenuOpen ? '▴' : '▾' }}</span>
    </button>

    <div class="mapa-basemap-menu" *ngIf="basemapMenuOpen">
      <button
        type="button"
        class="mapa-basemap-option"
        *ngFor="let option of basemapOptions"
        [class.active]="option.key === selectedBasemap"
        (click)="setBasemap(option.key)"
      >
        <span class="mapa-basemap-option-title">{{ option.label }}</span>
        <span class="mapa-basemap-option-check" *ngIf="option.key === selectedBasemap">
          ✓
        </span>
      </button>
    </div>
  </div>

  <div #mapContainer class="mapa-canvas"></div>
</div>
