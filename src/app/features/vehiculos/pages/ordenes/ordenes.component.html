<app-vehiculos-page-header title="Órdenes de trabajo" subtitle="">
  <button pButton type="button" severity="secondary" icon="pi pi-arrow-left" label="Volver" (click)="volver()"></button>
  <button pButton type="button" icon="pi pi-plus" label="Nueva OT" (click)="nuevo()"></button>
</app-vehiculos-page-header>

<p-confirmDialog></p-confirmDialog>

<div class="toolbarCard toolbarCard--compact">
  <div class="searchBox">
    <i class="pi pi-search"></i>
    <input
      pInputText
      type="text"
      [(ngModel)]="q"
      placeholder="Buscar OT, estado o detalle..."
      (keyup.enter)="cargar()">
  </div>

  <div class="toolbarActions">
    <button pButton type="button" severity="secondary" [text]="true" label="Limpiar" (click)="q=''; cargar()"></button>
    <button pButton type="button" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button>
  </div>
</div>

<div class="ordenesLayout">
  <section class="backlogCard">
    <div class="backlogCard__header">
      <h3>Backlog</h3>
      <p-tag [value]="ordenes().length + ' OT'" severity="secondary"></p-tag>
    </div>

    <div class="backlogCard__body" *ngIf="ordenes().length; else noOrdenes">
      <article
        class="jiraLikeRow"
        *ngFor="let item of ordenes()"
        [class.selected]="selectedOrden()?.idVehOrdenTrabajo === item.idVehOrdenTrabajo"
        (click)="seleccionarOrden(item)">
        <div class="rowHeader">
          <div class="rowCopy">
            <div class="primaryCell">OT #{{ item.idVehOrdenTrabajo }} · {{ item.tipoServicio || 'SERVICIO' }}</div>
            <div class="secondaryCell">{{ item.estadoOrden || 'RECIBIDO' }} · {{ item.fechaIngreso || item.fecGen || 'Sin fecha' }}</div>
          </div>

          <div class="rowActions">
            <p-tag [value]="item.estadoOrden || 'RECIBIDO'" [severity]="severityEstado(item.estadoOrden)"></p-tag>

            <button
              pButton
              type="button"
              size="small"
              [text]="true"
              icon="pi pi-pencil"
              [disabled]="isOrdenAnulada(item)"
              (click)="editarOrden(item); $event.stopPropagation()">
            </button>

            <button
              pButton
              type="button"
              size="small"
              [text]="true"
              severity="warn"
              icon="pi pi-ban"
              [disabled]="isOrdenAnulada(item)"
              (click)="anularOrden(item); $event.stopPropagation()">
            </button>

            <button
              pButton
              type="button"
              size="small"
              [text]="true"
              severity="danger"
              icon="pi pi-trash"
              (click)="eliminarOrden(item); $event.stopPropagation()">
            </button>
          </div>
        </div>

        <div class="secondaryCell rowDetail">
          {{ item.fallaReportada || item.detalleCliente || item.observaciones || 'Sin detalle operativo' }}
        </div>
      </article>
    </div>
  </section>

  <section class="workspaceCard">
    <app-orden-detail-panel
      [orden]="selectedOrden()"
      [clienteNombre]="clienteNombreSeleccionado()"
      [vehiculoNombre]="vehiculoNombreSeleccionado()"
      [responsableRecepcionNombre]="responsableRecepcionNombre()"
      [responsableTecnicoNombre]="responsableTecnicoNombre()"
      [checklist]="checklist()"
      [trabajos]="trabajos()"
      [hallazgos]="hallazgos()"
      [selectedHallazgo]="selectedHallazgo()"
      [marcas]="marcas()"
      [fotos]="fotos()"
      [repuestos]="repuestos()"
      [autorizaciones]="autorizaciones()"
      [ordenFacturas]="ordenFacturas()"
      [vistas]="vistas()"
      [selectedVista]="selectedVista()"
      [facturasOt]="facturasOt()"
      [selectedFacturaOt]="selectedFacturaOt()"
      [facturaDetalle]="facturaDetalle()"
      [cobrosFactura]="cobrosFactura()"
      [workflowResultado]="workflowResultado()"
      [checklistLabelMap]="checklistLabelMap()"
      [trabajoLabelMap]="trabajoLabelMap()"
      [articuloLabelMap]="articuloLabelMap()"
      (openChecklist)="abrirChild('checklist')"
      (openTrabajo)="abrirChild('trabajo')"
      (openHallazgo)="abrirChild('hallazgo')"
      (openRepuesto)="abrirChild('repuesto')"
      (openAutorizacion)="abrirChild('autorizacion')"
      (openFoto)="abrirChild('foto')"
      (openWorkflow)="abrirComercialDrawer('workflow')"
      (openFactura)="abrirComercialDrawer('factura')"
      (openCobro)="abrirComercialDrawer('cobro')"
      (openContabilizar)="abrirComercialDrawer('contabilizar')"
      (selectHallazgo)="seleccionarHallazgo($event)"
      (selectVista)="seleccionarVista($event)"
      (selectFactura)="seleccionarFacturaOt($event)"
      (pointMarked)="createMarcaDesdeCanvas($event)">
    </app-orden-detail-panel>
  </section>
</div>

<ng-template #noOrdenes>
  <app-vehiculos-empty-state
    icon="pi pi-briefcase"
    title="Sin órdenes"
    subtitle="Crea una OT para empezar.">
  </app-vehiculos-empty-state>
</ng-template>

<app-orden-main-form-drawer
  [visible]="drawerVisible()"
  [saving]="saving()"
  [orden]="editingOrden()"
  (visibleChange)="onMainDrawerVisibleChange($event)"
  (requestClose)="cerrarDrawer()"
  (dirtyChange)="onMainDrawerDirtyChange($event)"
  (save)="guardarOrden($event)"
  (saveAndClose)="guardarOrden($event, true)">
</app-orden-main-form-drawer>
