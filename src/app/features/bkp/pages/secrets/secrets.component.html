<div class="bkpPageShell"><app-bkp-page-header title="Secretos" subtitle="Claves, tokens y credenciales cifradas. El valor real nunca se muestra."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><p-confirmDialog></p-confirmDialog><section class="toolbarCard"><div class="searchBox"><i class="pi pi-search"></i><input pInputText [ngModel]="q()" (ngModelChange)="q.set($event??'')" placeholder="Buscar secreto..." (keyup.enter)="cargar()"></div></section><section class="noticeStrip" *ngIf="loading()||saving()||dirty()"><span class="noticePill is-info" *ngIf="loading()">Cargando</span><span class="noticePill is-info" *ngIf="saving()">Guardando</span><span class="noticePill is-warning" *ngIf="dirty()">Sin guardar</span></section><section class="bkpWorkspace"><aside class="contentCard sidebarPanel"><div class="sectionHead"><div><h4>Secretos</h4><div class="secondaryCell">{{items().length}} registro(s)</div></div></div><div class="listScroll"><button class="entityRow" type="button" *ngFor="let item of items()" [class.selected]="selected()?.idBkpSecret===item.idBkpSecret" (click)="seleccionar(item)"><div class="entityRow__main"><strong>{{item.nombre}}</strong><span>{{item.tipoSecret}} · {{item.algoritmo}}</span></div></button></div></aside><section class="contentCard editorPanel"><div class="sectionHead"><div><h4>Editor seguro</h4><div class="secondaryCell">Para cambiar el secreto, escribe nuevo valor y confirmación.</div></div></div><div class="editorScroll"><textarea pTextarea class="jsonEditor" [ngModel]="jsonText()" (ngModelChange)="onChange($event)"></textarea><div class="grid cols-2"><label><span>Nuevo valor secreto</span><input type="password" [ngModel]="valorPlano()" (ngModelChange)="valorPlano.set($event);onChange(jsonText())"></label><label><span>Confirmar valor</span><input type="password" [ngModel]="confirmarValor()" (ngModelChange)="confirmarValor.set($event);onChange(jsonText())"></label></div><div class="editorActions"><button pButton type="button" icon="pi pi-save" label="Guardar" [loading]="saving()" (click)="guardar()"></button></div></div></section></section></div>
