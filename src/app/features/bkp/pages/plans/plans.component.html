<p-confirmDialog></p-confirmDialog><div class="bkpPageShell"><app-bkp-page-header eyebrow="Planificación" title="Planes" subtitle="Une origen, agente, horario, formato, cifrado y destinos."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button><button pButton type="button" severity="success" icon="pi pi-play" label="Ejecutar" [disabled]="!selected()" [loading]="running()" (click)="ejecutar()"></button></app-bkp-page-header><section class="bkpToolbar"><div class="bkpSearchBox"><i class="pi pi-search"></i><input [value]="q()" (input)="q.set($any($event.target).value)" placeholder="Buscar plan..." (keyup.enter)="cargar()"></div><button pButton type="button" label="Buscar" icon="pi pi-search" (click)="cargar()"></button></section><section class="bkpInfoStrip" *ngIf="loading()||saving()||dirty()||error()||success()"><span class="bkpNotice info" *ngIf="loading()">Cargando</span><span class="bkpNotice info" *ngIf="saving()">Guardando</span><span class="bkpNotice warn" *ngIf="dirty()">Cambios pendientes</span><span class="bkpNotice danger" *ngIf="error()">{{error()}}</span><span class="bkpNotice success" *ngIf="success()">{{success()}}</span></section><section class="bkpWorkbench"><aside class="bkpPanel pad"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>Planes</h3><p>{{items().length}} registro(s)</p></div></div><div class="bkpList" *ngIf="items().length;else empty"><button class="bkpRow" type="button" *ngFor="let i of items()" [class.active]="selected()?.idBkpPlan===i.idBkpPlan" (click)="seleccionar(i)"><span><strong>{{i.nombre}}</strong><small>{{sourceLabel(i.idBkpSourceDatabaseFk)}} · {{i.tipoBackup}}</small></span><span class="bkpBadge" [class.ok]="i.activo!==false">{{i.activo===false?'Inactivo':'Activo'}}</span></button></div><ng-template #empty><app-bkp-empty-state icon="pi pi-calendar-clock" title="Sin planes" subtitle="Crea un plan cuando tengas agente, origen y destino."></app-bkp-empty-state></ng-template></aside><section class="bkpPanel pad"><form class="bkpForm" [formGroup]="form" (ngSubmit)="guardar()"><div class="bkpPanelHeader"><div class="bkpPanelTitle"><h3>{{selected()?'Editar plan':'Nuevo plan'}}</h3><p>Los campos marcados son necesarios para ejecutar.</p></div></div><div class="bkpFormGrid"><div class="bkpField full"><label>Nombre *</label><input formControlName="nombre"></div><div class="bkpField"><label>Origen *</label><select formControlName="idBkpSourceDatabaseFk"><option [ngValue]="null">Seleccione...</option><option *ngFor="let s of sources()" [ngValue]="s.idBkpSourceDatabase">{{s.nombre}} · {{s.motor}}</option></select></div><div class="bkpField"><label>Agente *</label><select formControlName="idBkpAgentNodeFk"><option [ngValue]="null">Seleccione...</option><option *ngFor="let a of agents()" [ngValue]="a.idBkpAgentNode">{{a.nombre}}</option></select></div><div class="bkpField"><label>Horario</label><select formControlName="idBkpScheduleFk"><option [ngValue]="null">Manual</option><option *ngFor="let s of schedules()" [ngValue]="s.idBkpSchedule">{{s.nombre}} · {{s.tipoSchedule}}</option></select></div><div class="bkpField"><label>Tipo backup *</label><select formControlName="tipoBackup"><option *ngFor="let t of backupTypes()" [value]="t">{{t}}</option></select></div><div class="bkpField"><label>Formato *</label><select formControlName="formatoSalida"><option *ngFor="let f of formatos()" [value]="f">{{f}}</option></select></div><div class="bkpField"><label>Compresión</label><select formControlName="compressionEnabled"><option [ngValue]="true">Sí</option><option [ngValue]="false">No</option></select></div><div class="bkpField"><label>Tipo compresión</label><select formControlName="compressionType"><option *ngFor="let c of compressionTypes()" [value]="c">{{c}}</option></select></div><div class="bkpField"><label>Cifrado</label><select formControlName="encryptionEnabled"><option [ngValue]="false">No</option><option [ngValue]="true">Sí</option></select></div><div class="bkpField"><label>Secreto cifrado</label><select formControlName="idBkpSecretEncryptionFk"><option [ngValue]="null">Sin secreto</option><option *ngFor="let s of secrets()" [ngValue]="s.idBkpSecret">{{s.nombre}} · {{s.tipoSecret}}</option></select></div><div class="bkpField"><label>Verificar</label><select formControlName="verifyAfterBackup"><option [ngValue]="true">Sí</option><option [ngValue]="false">No</option></select></div><div class="bkpField"><label>Checksum</label><select formControlName="calculateChecksum"><option [ngValue]="true">Sí</option><option [ngValue]="false">No</option></select></div><div class="bkpField"><label>Retención local días *</label><input type="number" formControlName="localRetentionDays"></div><div class="bkpField"><label>Runtime máx. minutos *</label><input type="number" formControlName="maxRuntimeMinutes"></div><div class="bkpField full"><label>Temp path local</label><input formControlName="localTempPath"></div><div class="bkpField full"><label>Extra dump args</label><input formControlName="extraDumpArgs"></div><div class="bkpField full"><label>Destinos *</label><div class="bkpSoftBox"><label class="bkpHint" *ngFor="let d of destinations()" style="display:flex;gap:.45rem;align-items:center;margin:.2rem 0"><input type="checkbox" [checked]="destinationIds().includes(d.idBkpStorageDestination)" (change)="toggleDestination(d.idBkpStorageDestination,$any($event.target).checked)" style="width:auto;min-height:auto"> {{d.nombre}} · {{d.tipoStorage}}</label></div></div><div class="bkpField"><label>Scope</label><select formControlName="scopeType"><option value="FULL">FULL</option><option value="SCHEMA_ONLY">SCHEMA_ONLY</option><option value="DATA_ONLY">DATA_ONLY</option><option value="INCLUDE_TABLES">INCLUDE_TABLES</option><option value="EXCLUDE_TABLES">EXCLUDE_TABLES</option></select></div><div class="bkpField"><label>Owner</label><select formControlName="includeOwner"><option [ngValue]="false">No</option><option [ngValue]="true">Sí</option></select></div><div class="bkpField"><label>Privilegios</label><select formControlName="includePrivileges"><option [ngValue]="false">No</option><option [ngValue]="true">Sí</option></select></div><div class="bkpField"><label>Estado</label><select formControlName="activo"><option [ngValue]="true">Activo</option><option [ngValue]="false">Inactivo</option></select></div><div class="bkpField full"><label>Scope config JSON avanzado</label><textarea formControlName="scopeConfigJson"></textarea></div><div class="bkpField full"><label>Filtros tabla JSON avanzado</label><textarea formControlName="tableFiltersJson"></textarea></div></div><div class="bkpActions"><button pButton type="button" severity="danger" [outlined]="true" label="Desactivar" [disabled]="!selected()" (click)="eliminar()"></button><button pButton type="submit" icon="pi pi-save" label="Guardar plan" [loading]="saving()"></button></div></form></section></section></div>
