<div
  class="overlay"
  *ngIf="visible"
  (click)="closeRequested.emit()"
>
  <div
    class="context-wrap"
    *ngIf="elemento as e"
    [style.left.px]="x"
    [style.top.px]="y"
    (click)="$event.stopPropagation()"
  >
    <div class="context-header">
      <div class="context-title">{{ e.nombre }}</div>
      <div class="context-subtitle">{{ e.geomTipo }} · {{ e.estado }}</div>
    </div>

    <button
      pButton
      type="button"
      label="Editar datos"
      (click)="editDataRequested.emit(e)"
    ></button>

    <button
      pButton
      type="button"
      label="Editar forma"
      severity="secondary"
      (click)="editGeometryRequested.emit(e)"
    ></button>

    <button
      pButton
      type="button"
      label="Centrar en mapa"
      severity="secondary"
      (click)="centerRequested.emit(e)"
    ></button>

    <button
      pButton
      type="button"
      label="Eliminar"
      severity="danger"
      (click)="deleteRequested.emit(e)"
    ></button>
  </div>
</div>
