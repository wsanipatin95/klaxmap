<div class="page-grid">
  <section class="panel">
    <h2>Nodos</h2>

    <div class="list">
      <button
        type="button"
        class="row"
        *ngFor="let n of nodos()"
        (click)="seleccionar(n)"
      >
        <strong>{{ n.nodo }}</strong>
        <span>{{ n.tipoNodo }}</span>
      </button>
    </div>
  </section>

  <section class="panel">
    <h3>Crear nodo</h3>
    <app-mapa-nodo-form
      [modo]="'crear'"
      [nodosPadre]="nodos()"
      (createSubmitted)="crear($event)"
    />
  </section>

  <section class="panel" *ngIf="selected() as sel">
    <h3>Editar nodo</h3>
    <app-mapa-nodo-form
      [modo]="'editar'"
      [nodo]="sel"
      [nodosPadre]="nodos()"
      (updateSubmitted)="editar($event)"
    />
    <button type="button" class="delete-btn" (click)="eliminar(sel.idRedNodo)">
      Eliminar
    </button>
  </section>

  <section class="panel panel-history">
    <app-auditoria-registro
      [tabla]="'kxt_red_nodo'"
      [idRegistro]="selected()?.idRedNodo ?? null"
      titulo="Historial del nodo"
      subtitulo="Quién cambió, cuándo y qué cambió"
    />
  </section>
</div>

<p class="error" *ngIf="error() as err">{{ err }}</p>
