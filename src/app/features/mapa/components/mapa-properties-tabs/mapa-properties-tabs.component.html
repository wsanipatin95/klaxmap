<div class="tabs-wrap" *ngIf="elemento as el">
  <div class="tabs-header">
    <button
      type="button"
      class="tab-btn"
      [class.active]="tab() === 'datos'"
      (click)="setTab('datos')"
    >
      Datos
    </button>

    <button
      type="button"
      class="tab-btn"
      [class.active]="tab() === 'meta'"
      (click)="setTab('meta')"
    >
      Meta
    </button>

    <button
      type="button"
      class="tab-btn"
      [class.active]="tab() === 'kml'"
      (click)="setTab('kml')"
    >
      KML
    </button>
  </div>

  <div class="tabs-content" *ngIf="tab() === 'datos'">
    <app-mapa-element-form
      #elementForm
      [elemento]="el"
      [tipos]="tipos"
      [nodos]="nodos"
      [saving]="saving"
      (saved)="saved.emit($event)"
      (deleted)="deleted.emit($event)"
      (restored)="restored.emit($event)"
      (dirtyChange)="onDirtyChange($event)"
    />
  </div>

  <div class="tabs-content" *ngIf="tab() === 'meta'">
    <div class="json-block">
      <div class="json-title">Atributos</div>
      <pre>{{ isEmptyObject(el.atributos) ? '{}' : jsonPretty(el.atributos) }}</pre>
    </div>
  </div>

  <div class="tabs-content" *ngIf="tab() === 'kml'">
    <div class="json-block">
      <div class="json-title">KML</div>
      <pre>{{ isEmptyObject(el.kmlExtendedData) ? '{}' : jsonPretty(el.kmlExtendedData) }}</pre>
    </div>
  </div>
</div>
