<div class="ge-toolbar-shell">
  <div class="ge-toolbar-strip" role="toolbar" aria-label="Herramientas del mapa">
    <button
      type="button"
      class="tool-btn"
      [class.active]="!sidebarHidden"
      [title]="sidebarToggleTitle()"
      [attr.aria-label]="sidebarToggleTitle()"
      (click)="sidebarToggleRequested.emit()"
    >
      <i class="pi" [class.pi-bars]="sidebarHidden" [class.pi-times]="!sidebarHidden"></i>
    </button>

    <button
      type="button"
      class="tool-btn"
      [class.active]="sidebarCompact"
      [disabled]="sidebarHidden"
      [title]="sidebarCompactTitle()"
      [attr.aria-label]="sidebarCompactTitle()"
      (click)="sidebarCompactRequested.emit()"
    >
      <i class="pi" [class.pi-angle-double-left]="!sidebarCompact" [class.pi-angle-double-right]="sidebarCompact"></i>
    </button>

    <span class="tool-separator" aria-hidden="true"></span>

    <button
      type="button"
      class="tool-btn"
      [class.active]="isActive('select')"
      title="Seleccionar elementos"
      aria-label="Seleccionar elementos"
      (click)="selectModeRequested.emit()"
    >
      <i class="pi pi-mouse-pointer"></i>
    </button>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('edit-geometry') || editSessionActive"
      title="Editar forma"
      aria-label="Editar forma"
      (click)="editGeometryModeRequested.emit()"
    >
      <i class="pi pi-pencil"></i>
    </button>

    <span class="tool-separator" aria-hidden="true"></span>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('draw-point')"
      title="Crear punto"
      aria-label="Crear punto"
      (click)="drawPointModeRequested.emit()"
    >
      <i class="pi pi-map-marker"></i>
    </button>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('draw-line')"
      title="Crear línea"
      aria-label="Crear línea"
      (click)="drawLineModeRequested.emit()"
    >
      <i class="pi pi-minus"></i>
    </button>

    <button
      *ngIf="editarElemento()"
      type="button"
      class="tool-btn"
      [class.active]="isActive('draw-polygon')"
      title="Crear polígono"
      aria-label="Crear polígono"
      (click)="drawPolygonModeRequested.emit()"
    >
      <i class="pi pi-stop"></i>
    </button>

    <button
      type="button"
      class="tool-btn"
      [class.active]="isActive('measure')"
      title="Medir distancias"
      aria-label="Medir distancias"
      (click)="measureModeRequested.emit()"
    >
      <span class="tool-btn-glyph" aria-hidden="true">📏</span>
    </button>

    <span class="tool-separator" aria-hidden="true"></span>

    <button
      *ngIf="editarTipoElemento()"
      type="button"
      class="tool-btn"
      title="Tipos de elemento"
      aria-label="Tipos de elemento"
      (click)="manageTiposRequested.emit()"
    >
      <i class="pi pi-sitemap"></i>
    </button>

    <button
      *ngIf="editarTipoElemento()"
      type="button"
      class="tool-btn"
      title="Importar KML"
      aria-label="Importar KML"
      (click)="importRequested.emit()"
    >
      <i class="pi pi-upload"></i>
    </button>

    <button
      *ngIf="editarTipoElemento()"
      type="button"
      class="tool-btn"
      title="Exportar KML"
      aria-label="Exportar KML"
      (click)="exportRequested.emit()"
    >
      <i class="pi pi-download"></i>
    </button>

    <button
      type="button"
      class="tool-btn"
      title="Refrescar"
      aria-label="Refrescar"
      (click)="refreshRequested.emit()"
    >
      <i class="pi pi-refresh"></i>
    </button>
  </div>

  <div class="edit-strip" *ngIf="editSessionActive">
    <div class="edit-strip-copy">
      <strong>{{ editSessionElementName || 'Elemento' }}</strong>
      <span>
        {{
          editSessionDirty
            ? 'Hay cambios pendientes.'
            : 'Edición activa.'
        }}
      </span>
    </div>

    <div class="edit-strip-actions">
      <button
        type="button"
        class="edit-action"
        (click)="cancelEditRequested.emit()"
      >
        <i class="pi pi-times"></i>
        <span>Cancelar</span>
      </button>

      <button
        type="button"
        class="edit-action edit-action--primary"
        [disabled]="!editSessionDirty"
        (click)="saveEditRequested.emit()"
      >
        <i class="pi pi-check"></i>
        <span>Guardar</span>
      </button>
    </div>
  </div>
</div>
