<app-mapa-layout [propertiesOpen]="ui.propertiesOpen()" [sidebarMode]="ui.sidebarMode()"
  (sidebarBackdropRequested)="onSidebarBackdropRequested()">
  <app-mapa-toolbar slot="toolbar" [selectedName]="selectedElemento()?.nombre ?? null"
    [totalElementos]="elementosCanvas().length" [editSessionActive]="editSessionActive()"
    [editSessionDirty]="editSessionDirty()" [editSessionElementName]="editSessionElementName()"
    [sidebarMode]="ui.sidebarMode()" [basemap]="selectedBasemap()" [basemapOptions]="basemapOptions"
    [labelsVisible]="labelsVisible()" [locatingMyPosition]="locatingMyPosition()" (refreshRequested)="onRefresh()"
    (exportRequested)="abrirExportacion()" (importRequested)="abrirImportacion()"
    (manageTiposRequested)="irATiposElemento()" (saveEditRequested)="saveGeometryEdition()"
    (cancelEditRequested)="cancelGeometryEdition()" (selectModeRequested)="onToolbarSelectMode()"
    (editGeometryModeRequested)="onToolbarEditGeometryMode()" (drawPointModeRequested)="onToolbarDrawPointMode()"
    (drawLineModeRequested)="onToolbarDrawLineMode()" (drawPolygonModeRequested)="onToolbarDrawPolygonMode()"
    (measureModeRequested)="onToolbarMeasureMode()" (sidebarToggleRequested)="onToolbarSidebarToggle()"
    (myLocationRequested)="onToolbarMyLocationRequested()" (basemapSelectRequested)="onToolbarBasemapSelect($event)"
    (labelsToggleRequested)="onToolbarLabelsToggle()" />

  <app-mapa-sidebar slot="sidebar" [nodos]="nodos()" [elementos]="elementos()" [deletedElementos]="deletedElementos()"
    [tipos]="tipos()" [selectedNodoId]="selectedNodo()?.idRedNodo ?? null"
    [selectedElementoId]="selectedElemento()?.idGeoElemento ?? null" [searchValue]="filtros.q()"
    [searchLoading]="ui.loading()" [searchResultCount]="searchResultCount()"
    [searchResultIndex]="(filtros.q() || '').trim() ? searchResultIndex() : -1" [geoSearchValue]="geoSearchValue()"
    [geoSearchLoading]="geoSearchLoading()" [geoSearchHasSearched]="geoSearchHasSearched()"
    [geoSearchError]="geoSearchError()" [geoSearchResults]="geoSearchResults()" [hiddenNodeIds]="hiddenNodeIds()"
    [hiddenElementoIds]="hiddenElementoIds()" [deletedElementsVisible]="deletedElementsVisible()"
    (geoSearchRequested)="onGeoSearchRequested($event)" (geoSearchClear)="clearGeoSearch()"
    (geoSearchResultSelected)="onGeoSearchResultSelected($event)" (searchRequested)="onSearchRequested($event)"
    (searchClear)="clearSearch()" (searchPrev)="onSearchPrev()" (searchNext)="onSearchNext()"
    (nodoSelected)="onNodoSelect($event)" (treeElementoSelected)="onTreeElementoSelected($event)"
    (treeNodeVisibilityChange)="onTreeNodeVisibilityChange($event)"
    (treeElementoVisibilityChange)="onTreeElementoVisibilityChange($event)"
    (treeCreateNodeRequested)="onTreeCreateNodeRequested($event)"
    (treeEditNodeRequested)="onTreeEditNodeRequested($event)"
    (treeAuditNodeRequested)="onTreeAuditNodeRequested($event)"
    (treeDeleteNodeRequested)="onTreeDeleteNodeRequested($event)"
    (treeDrawElementRequested)="onTreeDrawElementRequested($event)"
    (treeCenterElementoRequested)="onTreeCenterElementoRequested($event)"
    (treeEditDataElementoRequested)="onTreeEditDataElementoRequested($event)"
    (treeAuditElementoRequested)="onTreeAuditElementoRequested($event)"
    (treeEditGeometryElementoRequested)="onTreeEditGeometryElementoRequested($event)"
    (treeDeleteElementoRequested)="onTreeDeleteElementoRequested($event)"
    (treeRestoreDeletedElementoRequested)="onTreeRestoreDeletedElementoRequested($event)"
    (deletedElementsVisibilityChange)="onDeletedElementsVisibilityChange($event)" />

  <app-mapa-canvas #mapCanvas slot="canvas" [elementos]="elementosCanvas()" [tipos]="tipos()" [toolMode]="ui.toolMode()"
    [selectedElementoId]="selectedElemento()?.idGeoElemento ?? null" [hiddenTipoIds]="capas.hiddenTipoIds()"
    [basemap]="selectedBasemap()" [labelsVisible]="labelsVisible()" (elementoSelected)="onElementoSelect($event)"
    (geometryCreated)="onGeometryCreated($event)" (editSessionStateChanged)="onEditSessionStateChanged($event)"
    (elementoContext)="openContextMenu($event)" />

  <app-mapa-properties-panel slot="properties" [open]="ui.propertiesOpen()" [elemento]="selectedElemento()"
    [tipos]="tipos()" [nodos]="nodos()" [requestedTab]="propertiesRequestedTab()" (saved)="onElementoUpdated($event)"
    (deleted)="onElementoDeleted($event)" (restored)="onElementoRestored($event)"
    (dirtyChange)="onPropertiesDirtyChange($event)" (closeRequested)="onPropertiesCloseRequested()" />

  <app-mapa-statusbar slot="status" [totalElementos]="elementosCanvas().length" [modo]="ui.toolMode()"
    [loading]="ui.loading()" [selectedName]="selectedElemento()?.nombre ?? null" />
</app-mapa-layout>

<app-mapa-import-dialog #importDialog (imported)="onImported()"></app-mapa-import-dialog>

<app-mapa-export-dialog #exportDialog [nodos]="nodos()" [tipos]="tipos()"></app-mapa-export-dialog>

<app-mapa-create-element-dialog #createDialog [nodos]="nodos()" [tipos]="tipos()"
  (submitted)="crearElemento($event)" (cancelled)="onCreateElementCancelled()" (requestAdjust)="onRequestAdjustGeometry($event)"></app-mapa-create-element-dialog>

<app-mapa-node-dialog #nodeDialog (createSubmitted)="onCreateNodeSubmitted($event)"
  (editSubmitted)="onEditNodeSubmitted($event)" (deleted)="onNodeDeleted($event)"
  (restored)="onNodeRestored($event)"></app-mapa-node-dialog>

<app-mapa-context-menu [visible]="contextVisible()" [x]="contextX()" [y]="contextY()" [elemento]="contextElemento()"
  (closeRequested)="closeContextMenu()" (centerRequested)="centerContextElemento($event)"
  (editDataRequested)="editDataContextElemento($event)" (auditRequested)="auditContextElemento($event)"
  (editGeometryRequested)="editGeometryContextElemento($event)"
  (deleteRequested)="deleteContextElemento($event)"></app-mapa-context-menu>

<app-mapa-confirm-dialog #confirmDialog></app-mapa-confirm-dialog>

<div class="mapa-success" *ngIf="successVisible()">
  <div class="mapa-success-title">{{ successTitle() }}</div>
  <div class="mapa-success-text">{{ successText() }}</div>
  <button type="button" class="mapa-success-close" (click)="clearSuccess()">Cerrar</button>
</div>

<div class="mapa-error" *ngIf="error() as err">
  <div class="mapa-error-title">Ocurrió un problema</div>
  <div class="mapa-error-text">{{ err }}</div>
  <button type="button" class="mapa-error-close" (click)="clearError()">Cerrar</button>
</div>

<div class="mapa-action-blocker" *ngIf="actionBusy()">
  <div class="mapa-action-card">
    <div class="mapa-action-title">{{ actionBusyTitle() }}</div>
    <div class="mapa-action-text">{{ actionBusyText() }}</div>
  </div>
</div>

@if (adjustingGeometry()) {
  <div class="adjust-bar" style="position:fixed;left:50%;bottom:1.25rem;transform:translateX(-50%);z-index:3000;display:flex;align-items:center;gap:.75rem;background:#1e293b;color:#fff;border-radius:.6rem;padding:.6rem .9rem;box-shadow:0 8px 24px rgba(15,23,42,.35);font-size:.85rem;">
    <span>Ajustando trazo: arrastra los vértices para moverlos, o arrastra los puntos medios para agregar un nodo.</span>
    <button type="button" (click)="terminarAjuste()" style="background:#16a34a;color:#fff;border:none;border-radius:.4rem;padding:.35rem .8rem;cursor:pointer;">Terminar ajuste</button>
    <button type="button" (click)="cancelarAjuste()" style="background:transparent;color:#cbd5e1;border:1px solid #475569;border-radius:.4rem;padding:.35rem .8rem;cursor:pointer;">Cancelar</button>
  </div>
}
