<app-mapa-layout
  [propertiesOpen]="ui.propertiesOpen()"
  [sidebarMode]="ui.sidebarMode()"
  (sidebarBackdropRequested)="onSidebarBackdropRequested()"
>
  <app-mapa-toolbar
    slot="toolbar"
    [selectedName]="selectedElemento()?.nombre ?? null"
    [totalElementos]="elementosCanvas().length"
    [editSessionActive]="editSessionActive()"
    [editSessionDirty]="editSessionDirty()"
    [editSessionElementName]="editSessionElementName()"
    (refreshRequested)="onRefresh()"
    (exportRequested)="abrirExportacion()"
    (importRequested)="abrirImportacion()"
    (manageTiposRequested)="irATiposElemento()"
    (saveEditRequested)="saveGeometryEdition()"
    (cancelEditRequested)="cancelGeometryEdition()"
    (selectModeRequested)="onToolbarSelectMode()"
    (editGeometryModeRequested)="onToolbarEditGeometryMode()"
    (drawPointModeRequested)="onToolbarDrawPointMode()"
    (drawLineModeRequested)="onToolbarDrawLineMode()"
    (drawPolygonModeRequested)="onToolbarDrawPolygonMode()"
    (measureModeRequested)="onToolbarMeasureMode()"
  />

  <app-mapa-sidebar
    slot="sidebar"
    [nodos]="nodos()"
    [elementos]="elementos()"
    [tipos]="tipos()"
    [selectedNodoId]="selectedNodo()?.idRedNodo ?? null"
    [selectedElementoId]="selectedElemento()?.idGeoElemento ?? null"
    [searchValue]="filtros.q()"
    [searchLoading]="ui.loading()"
    [searchResultCount]="(filtros.q() || '').trim() ? elementosCanvas().length : 0"
    [searchResultIndex]="(filtros.q() || '').trim() ? searchResultIndex() : -1"
    [geoSearchValue]="geoSearchValue()"
    [geoSearchLoading]="geoSearchLoading()"
    [geoSearchHasSearched]="geoSearchHasSearched()"
    [geoSearchError]="geoSearchError()"
    [geoSearchResults]="geoSearchResults()"
    [hiddenNodeIds]="hiddenNodeIds()"
    [hiddenElementoIds]="hiddenElementoIds()"
    (geoSearchRequested)="onGeoSearchRequested($event)"
    (geoSearchClear)="clearGeoSearch()"
    (geoSearchResultSelected)="onGeoSearchResultSelected($event)"
    (searchRequested)="onSearchRequested($event)"
    (searchClear)="clearSearch()"
    (searchPrev)="onSearchPrev()"
    (searchNext)="onSearchNext()"
    (nodoSelected)="onNodoSelect($event)"
    (treeElementoSelected)="onTreeElementoSelected($event)"
    (treeNodeVisibilityChange)="onTreeNodeVisibilityChange($event)"
    (treeElementoVisibilityChange)="onTreeElementoVisibilityChange($event)"
    (treeCreateNodeRequested)="onTreeCreateNodeRequested($event)"
    (treeEditNodeRequested)="onTreeEditNodeRequested($event)"
    (treeDeleteNodeRequested)="onTreeDeleteNodeRequested($event)"
    (treeDrawElementRequested)="onTreeDrawElementRequested($event)"
    (treeCenterElementoRequested)="onTreeCenterElementoRequested($event)"
    (treeEditDataElementoRequested)="onTreeEditDataElementoRequested($event)"
    (treeEditGeometryElementoRequested)="onTreeEditGeometryElementoRequested($event)"
    (treeDeleteElementoRequested)="onTreeDeleteElementoRequested($event)"
  />

  <app-mapa-canvas
    #mapCanvas
    slot="canvas"
    [elementos]="elementosCanvas()"
    [tipos]="tipos()"
    [toolMode]="ui.toolMode()"
    [selectedElementoId]="selectedElemento()?.idGeoElemento ?? null"
    [hiddenTipoIds]="capas.hiddenTipoIds()"
    (elementoSelected)="onElementoSelect($event)"
    (geometryCreated)="onGeometryCreated($event)"
    (editSessionStateChanged)="onEditSessionStateChanged($event)"
    (elementoContext)="openContextMenu($event)"
  />

  <app-mapa-properties-panel
    slot="properties"
    [open]="ui.propertiesOpen()"
    [elemento]="selectedElemento()"
    [tipos]="tipos()"
    [nodos]="nodos()"
    (saved)="onElementoUpdated($event)"
    (deleted)="onElementoDeleted($event)"
    (dirtyChange)="onPropertiesDirtyChange($event)"
    (closeRequested)="onPropertiesCloseRequested()"
  />

  <app-mapa-statusbar
    slot="status"
    [totalElementos]="elementosCanvas().length"
    [modo]="ui.toolMode()"
    [loading]="ui.loading()"
    [selectedName]="selectedElemento()?.nombre ?? null"
  />
</app-mapa-layout>

<div class="mapa-sidebar-fab-group">
  <button
    type="button"
    class="mapa-sidebar-fab"
    [attr.aria-label]="ui.sidebarOpen() ? 'Ocultar panel lateral' : 'Mostrar panel lateral'"
    [attr.title]="ui.sidebarOpen() ? 'Ocultar panel lateral' : 'Mostrar panel lateral'"
    (click)="onToolbarSidebarToggle()"
  >
    <i
      class="pi"
      [class.pi-bars]="!ui.sidebarOpen()"
      [class.pi-times]="ui.sidebarOpen()"
      aria-hidden="true"
    ></i>
  </button>

  <button
    type="button"
    class="mapa-sidebar-fab mapa-sidebar-fab--secondary"
    [class.is-active]="ui.sidebarCompact()"
    [disabled]="!ui.sidebarOpen()"
    aria-label="Comprimir o expandir panel lateral"
    title="Comprimir o expandir panel lateral"
    (click)="onToolbarSidebarCompactToggle()"
  >
    <i
      class="pi"
      [class.pi-angle-double-left]="!ui.sidebarCompact()"
      [class.pi-angle-double-right]="ui.sidebarCompact()"
      aria-hidden="true"
    ></i>
  </button>
</div>

<div class="mapa-quick-info">
  {{ quickInfo() }}
</div>

<app-mapa-import-dialog
  #importDialog
  (imported)="onImported()"
></app-mapa-import-dialog>

<app-mapa-export-dialog
  #exportDialog
  [nodos]="nodos()"
  [tipos]="tipos()"
></app-mapa-export-dialog>

<app-mapa-create-element-dialog
  #createDialog
  [nodos]="nodos()"
  [tipos]="tipos()"
  (submitted)="crearElemento($event)"
></app-mapa-create-element-dialog>

<app-mapa-node-dialog
  #nodeDialog
  (createSubmitted)="onCreateNodeSubmitted($event)"
  (editSubmitted)="onEditNodeSubmitted($event)"
></app-mapa-node-dialog>

<app-mapa-context-menu
  [visible]="contextVisible()"
  [x]="contextX()"
  [y]="contextY()"
  [elemento]="contextElemento()"
  (closeRequested)="closeContextMenu()"
  (centerRequested)="centerContextElemento($event)"
  (editDataRequested)="editDataContextElemento($event)"
  (editGeometryRequested)="editGeometryContextElemento($event)"
  (deleteRequested)="deleteContextElemento($event)"
></app-mapa-context-menu>

<app-mapa-confirm-dialog
  #confirmDialog
></app-mapa-confirm-dialog>

<div class="mapa-success" *ngIf="successVisible()">
  <div class="mapa-success-title">{{ successTitle() }}</div>
  <div class="mapa-success-text">{{ successText() }}</div>
  <button type="button" class="mapa-success-close" (click)="clearSuccess()">Cerrar</button>
</div>

<div class="mapa-error" *ngIf="error() as err">
  <div class="mapa-error-title">Ocurrió un problema</div>
  <div class="mapa-error-text">{{ err }}</div>
  <button type="button" class="mapa-error-close" (click)="clearError()">Cerrar</button>
</div>

<div class="mapa-action-blocker" *ngIf="actionBusy()">
  <div class="mapa-action-card">
    <div class="mapa-action-title">{{ actionBusyTitle() }}</div>
    <div class="mapa-action-text">{{ actionBusyText() }}</div>
  </div>
</div>
