<div class="properties-wrap">
  <ng-container *ngIf="elemento; else emptyState">
    <div class="panel-header">
      <div>
        <h3>{{ elemento.nombre }}</h3>
        <small>{{ elemento.geomTipo }} · {{ elemento.estado }}</small>
      </div>

      <button
        pButton
        type="button"
        label="Eliminar"
        severity="danger"
        (click)="eliminar()"
      ></button>
    </div>

    <app-mapa-properties-tabs
      [elemento]="elemento"
      [tipos]="tipos"
      [nodos]="nodos"
      (submitted)="guardar($event)"
    />
  </ng-container>

  <ng-template #emptyState>
    <div class="empty-state">
      Selecciona un elemento del mapa para ver sus propiedades.
    </div>
  </ng-template>
</div>
