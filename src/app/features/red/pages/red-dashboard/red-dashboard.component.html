<div class="red-dash-shell">
  <header class="page-topbar">
    <div class="page-topbar-copy">
      <h2>Dashboard de red</h2>
      <p>Auditoría inteligente · indicadores</p>
    </div>

    <div class="page-topbar-actions">
      <button type="button" class="ghost-btn" (click)="cargar()" [disabled]="loading()">
        {{ loading() ? 'Actualizando...' : 'Refrescar' }}
      </button>
    </div>
  </header>

  <div class="status-strip" *ngIf="loading() || error()">
    <div class="status-chip info" *ngIf="loading()">Cargando...</div>
    <div class="status-chip error" *ngIf="error()">{{ error() }}</div>
  </div>

  <div class="dash-grid">
    <section class="panel" *ngFor="let g of grupos()">
      <div class="panel-head">
        <h3>{{ g.grupo }}</h3>
      </div>

      <ul class="kpi-list">
        <li class="kpi-row" *ngFor="let it of g.items">
          <span class="kpi-label">{{ it.indicador }}</span>
          <span class="kpi-value">{{ it.valor | number }}</span>
        </li>
      </ul>
    </section>

    <div class="empty" *ngIf="!loading() && grupos().length === 0">
      Sin indicadores para mostrar.
    </div>
  </div>
</div>
