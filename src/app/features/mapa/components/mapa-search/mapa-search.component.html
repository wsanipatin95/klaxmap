<div class="mapa-search">
  <div class="search-input-wrap">
    <input
      type="text"
      [ngModel]="value"
      (ngModelChange)="valueChange.emit($event)"
      [placeholder]="placeholder"
    />

    <button
      type="button"
      class="clear-btn"
      *ngIf="value"
      (click)="clearRequested.emit()"
      aria-label="Limpiar búsqueda"
    >
      ✕
    </button>
  </div>

  <div class="search-status" *ngIf="value || loading">
    <span *ngIf="loading">Buscando...</span>
    <span *ngIf="!loading && value">Resultados visibles: {{ resultCount }}</span>
  </div>
</div>
