<div class="page-grid">
  <section class="panel">
    <h2>Nodos</h2>

    <div class="list">
      <button
        type="button"
        class="row"
        *ngFor="let n of nodos()"
        (click)="seleccionar(n)"
      >
        <strong>{{ n.nodo }}</strong>
        <span>{{ n.tipoNodo }}</span>
      </button>
    </div>
  </section>

  <section class="panel">
    <h3>Crear nodo</h3>
    <app-mapa-nodo-form
      [modo]="'crear'"
      [nodosPadre]="nodos()"
      (createSubmitted)="crear($event)"
    />
  </section>

  <section class="panel" *ngIf="selected() as sel">
    <h3>Editar nodo</h3>
    <app-mapa-nodo-form
      [modo]="'editar'"
      [nodo]="sel"
      [nodosPadre]="nodos()"
      (updateSubmitted)="editar($event)"
    />
    @if (!confirmandoEliminar()) {
      <button type="button" class="delete-btn" (click)="confirmandoEliminar.set(true)">
        Eliminar
      </button>
    } @else {
      <div class="delete-confirm" style="margin-top:.5rem;background:#fef2f2;border:1px solid #fecaca;border-radius:.4rem;padding:.5rem;">
        <p style="margin:0 0 .4rem;font-size:.85rem;color:#991b1b;">¿Eliminar el nodo "{{ sel.nodo }}"? Esta acción no se puede deshacer fácilmente.</p>
        <button type="button" class="delete-btn" (click)="eliminar(sel.idRedNodo)">Sí, eliminar</button>
        <button type="button" (click)="confirmandoEliminar.set(false)" style="margin-left:.5rem;">Cancelar</button>
      </div>
    }
  </section>

  <section class="panel panel-history">
    <app-auditoria-registro
      [tabla]="'kxt_red_nodo'"
      [idRegistro]="selected()?.idRedNodo ?? null"
      titulo="Historial del nodo"
      subtitulo="Quién cambió, cuándo y qué cambió"
    />
  </section>
</div>

<p class="error" *ngIf="error() as err">{{ err }}</p>
