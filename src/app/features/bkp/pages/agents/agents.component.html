<div class="bkpPageShell"><app-bkp-page-header title="Agentes y binarios" subtitle="Servidores donde corre el JAR y rutas de pg_dump/mysqldump."><button pButton type="button" severity="secondary" [text]="true" icon="pi pi-refresh" label="Recargar" [loading]="loading()" (click)="cargar()"></button><button pButton type="button" icon="pi pi-plus" label="Nuevo" (click)="nuevo()"></button></app-bkp-page-header><p-confirmDialog></p-confirmDialog><section class="noticeStrip" *ngIf="loading()||saving()||dirty()"><span class="noticePill is-info" *ngIf="loading()">Cargando</span><span class="noticePill is-info" *ngIf="saving()">Guardando</span><span class="noticePill is-warning" *ngIf="dirty()">Sin guardar</span></section><div class="tabBar"><button class="tabButton" [class.active]="tab()==='agents'" (click)="tab.set('agents');selected.set(null);nuevo()">Agentes</button><button class="tabButton" [class.active]="tab()==='tools'" (click)="tab.set('tools');selected.set(null);nuevo()">Binarios</button></div><section class="bkpWorkspace"><aside class="contentCard sidebarPanel"><div class="sectionHead"><div><h4>{{tab()==='agents'?'Agentes':'Binarios'}}</h4><div class="secondaryCell">{{items().length}} registro(s)</div></div></div><div class="listScroll"><button class="entityRow" type="button" *ngFor="let item of items()" [class.selected]="selected()?.[idField()]===item[idField()]" (click)="seleccionar(item)"><div class="entityRow__main"><strong>{{item.nombre||item.herramienta||item[idField()]}}</strong><span>{{item.osType||item.motor}} · {{item.hostname||item.binaryPath||item.ipAddress||'-'}}</span></div></button></div></aside><section class="contentCard editorPanel"><div class="sectionHead"><div><h4>Editor JSON</h4><div class="secondaryCell">Configuración completa del registro seleccionado.</div></div></div><div class="editorScroll"><textarea pTextarea class="jsonEditor" [ngModel]="jsonText()" (ngModelChange)="onChange($event)"></textarea><div class="editorActions"><button pButton type="button" icon="pi pi-save" label="Guardar" [loading]="saving()" (click)="guardar()"></button></div></div></section></section></div>
