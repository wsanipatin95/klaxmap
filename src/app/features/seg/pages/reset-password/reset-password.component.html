<!-- FULLSCREEN BLOCKER -->
<div *ngIf="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[1px]"
    aria-live="polite" aria-busy="true">
    <div class="bg-white rounded-2xl shadow-2xl px-6 py-5 w-[320px]">
        <div class="flex items-center gap-3">
            <i class="pi pi-spin pi-spinner text-xl"></i>
            <div class="leading-tight">
                <div class="font-semibold">Procesando…</div>
                <div class="text-xs text-gray-500">Por favor espera.</div>
            </div>
        </div>
        <div class="mt-4 h-1 w-full bg-gray-100 rounded">
            <div class="h-1 w-1/2 bg-gray-900/50 rounded animate-pulse"></div>
        </div>
    </div>
</div>

<div
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-50 via-primary-100 to-primary-200 p-4">
    <div class="w-full max-w-md">
        <p-card styleClass="shadow-2xl">
            <ng-template pTemplate="header">
                <div class="flex flex-col items-center pt-8 pb-4">
                    <div class="rounded-full p-4 mb-4 shadow-lg bg-primary-500">
                        <i class="pi pi-lock text-4xl text-white"></i>
                    </div>

                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Recuperar contraseña</h1>
                    <p class="text-gray-600 text-center px-4 text-sm">{{ message }}</p>
                </div>
            </ng-template>

            <div class="px-4 pb-6 space-y-4">
                <!-- ERROR TOKEN -->
                <div *ngIf="state === 'error'"
                    class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold mb-1">No se pudo validar el enlace</p>
                    <p class="text-sm">{{ message }}</p>

                    <div class="mt-3 space-y-2">
                        <button pButton type="button" label="Solicitar nuevo enlace" icon="pi pi-refresh" class="w-full"
                            styleClass="p-button-outlined" (click)="goForgot()" [disabled]="loading"></button>

                        <button pButton type="button" label="Ir a iniciar sesión" icon="pi pi-sign-in" class="w-full"
                            (click)="goLogin()" [disabled]="loading"></button>
                    </div>
                </div>

                <!-- SUCCESS -->
                <div *ngIf="state === 'success'"
                    class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold mb-1">¡Listo!</p>
                    <p class="text-sm">{{ message }}</p>

                    <button pButton type="button" label="Ir a iniciar sesión" icon="pi pi-sign-in" class="w-full mt-3"
                        (click)="goLogin()"></button>
                </div>

                <!-- FORM -->
                <form *ngIf="state === 'form'" [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div *ngIf="formError"
                        class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-3">
                        {{ formError }}
                    </div>

                    <label class="text-sm font-semibold text-gray-700">Nueva contraseña</label>
                    <p-password formControlName="password" [toggleMask]="true" [feedback]="true"
                        styleClass="w-full mt-2" inputStyleClass="w-full"></p-password>
                    <small *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
                        class="text-red-500 text-xs">
                        Mínimo 6 caracteres
                    </small>

                    <label class="text-sm font-semibold text-gray-700 mt-3 block">Confirmar contraseña</label>
                    <p-password formControlName="confirmPassword" [toggleMask]="true" [feedback]="false"
                        styleClass="w-full mt-2" inputStyleClass="w-full"></p-password>
                    <small *ngIf="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched"
                        class="text-red-500 text-xs">
                        Las contraseñas no coinciden
                    </small>

                    <button pButton type="submit" label="Guardar nueva contraseña" icon="pi pi-save" class="w-full mt-5"
                        [loading]="loading" [disabled]="loading"></button>
                </form>
            </div>
        </p-card>
    </div>
</div>
