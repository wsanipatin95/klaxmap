<div class="tipos-page-shell">
  <header class="page-topbar">
    <div class="page-topbar-copy">
      <h2>Tipos</h2>
      <p>Catálogo visual</p>
    </div>

    <div class="page-topbar-actions">
      <button type="button" class="ghost-btn" (click)="irAlMapa()">
        Volver
      </button>

      <button type="button" class="ghost-btn" (click)="cargar()" [disabled]="loading() || saving()">
        {{ loading() ? 'Actualizando...' : 'Refrescar' }}
      </button>

      <button type="button" class="primary-btn" (click)="nuevoTipo()" [disabled]="saving()">
        Nuevo tipo
      </button>
    </div>
  </header>

  <div class="status-strip" *ngIf="loading() || saving() || success() || error() || formDirty()">
    <div class="status-chip info" *ngIf="loading()">Cargando...</div>
    <div class="status-chip info" *ngIf="saving()">Guardando...</div>
    <div class="status-chip success" *ngIf="success()">{{ success() }}</div>
    <div class="status-chip error" *ngIf="error()">{{ error() }}</div>
    <div class="status-chip warning" *ngIf="formDirty()">Cambios sin guardar</div>
  </div>

  <div class="page-grid">
    <aside class="panel panel-list">
      <div class="panel-head">
        <div>
          <h3>Listado</h3>
          <p>{{ tipos().length }} tipo(s)</p>
        </div>
      </div>

      <div class="empty" *ngIf="!loading() && tipos().length === 0">
        No hay tipos.
      </div>

      <div class="list" *ngIf="tipos().length > 0">
        <button
          type="button"
          class="row"
          [class.active]="selected()?.idGeoTipoElemento === t.idGeoTipoElemento && mode() === 'editar'"
          *ngFor="let t of tipos()"
          (click)="seleccionar(t)"
        >
          <div class="row-preview-wrap">
            <span
              class="row-preview"
              [ngClass]="previewShapeClass(t)"
              [ngStyle]="previewStyle(t)"
            >
              <ng-container [ngSwitch]="previewVisualMode(t)">
                <span
                  *ngSwitchCase="'material'"
                  class="row-preview-material"
                  [class]="previewMaterialFamilyClass(t)"
                >
                  {{ previewMaterialGlyph(t) }}
                </span>

                <i
                  *ngSwitchCase="'class'"
                  class="row-preview-class"
                  [class]="previewClassName(t)"
                ></i>

                <img
                  *ngSwitchCase="'url'"
                  class="row-preview-image"
                  [src]="previewImageUrl(t)"
                  alt=""
                />
              </ng-container>
            </span>
          </div>

          <div class="row-copy">
            <strong [title]="t.nombre">{{ t.nombre }}</strong>
            <span>{{ t.codigo }} · {{ geometryLabel(t) }}</span>
          </div>

          <div class="row-meta">
            <span class="badge" [class.inactive]="!t.activo">
              {{ t.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </div>
        </button>
      </div>
    </aside>

    <section class="panel panel-editor">
      <div class="panel-head panel-head--editor">
        <div>
          <h3>{{ currentTitle() }}</h3>
          <p>{{ currentSubtitle() }}</p>
        </div>

        <button
          *ngIf="mode() === 'editar' && selected()"
          type="button"
          class="danger-btn"
          (click)="eliminarActual()"
          [disabled]="saving()"
        >
          Eliminar
        </button>
      </div>

      <div class="editor-tabs" *ngIf="mode() === 'editar' && selected()">
        <button
          type="button"
          class="editor-tab-btn"
          [class.active]="activeTab() === 'edicion'"
          (click)="setTab('edicion')"
        >
          Edición
        </button>

        <button
          type="button"
          class="editor-tab-btn"
          [class.active]="activeTab() === 'historial'"
          (click)="setTab('historial')"
        >
          Historial
        </button>
      </div>

      <div class="editor-body">
        <section class="editor-view" *ngIf="mode() === 'crear' || activeTab() === 'edicion'">
          <div class="editor-scroll">
            <app-mapa-tipo-form
              #tipoForm
              [modo]="mode()"
              [tipo]="selected()"
              [saving]="saving()"
              (saveRequested)="guardar($event)"
              (cancelRequested)="onFormCancel()"
              (dirtyChange)="onDirtyChange($event)"
            />
          </div>
        </section>

        <section class="editor-view" *ngIf="mode() === 'editar' && activeTab() === 'historial' && selected() as sel">
          <div class="editor-scroll">
            <app-auditoria-registro
              [tabla]="'kxt_geo_tipo_elemento'"
              [idRegistro]="sel.idGeoTipoElemento"
              [refreshKey]="auditRefreshKey()"
              [compact]="true"
              titulo="Historial del tipo"
              subtitulo="Cambios realizados sobre el tipo seleccionado"
            />
          </div>
        </section>
      </div>
    </section>
  </div>

  <app-mapa-confirm-dialog #confirmDialog />
</div>
