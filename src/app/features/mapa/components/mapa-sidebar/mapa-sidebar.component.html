<div #shell class="sidebar-shell">
  <div class="sidebar-top-search">
    <app-mapa-search
      [value]="searchValue"
      [loading]="searchLoading"
      [resultCount]="searchResultCount"
      [currentIndex]="searchResultIndex"
      (valueChange)="searchChange.emit($event)"
      (clearRequested)="searchClear.emit()"
      (prevRequested)="searchPrev.emit()"
      (nextRequested)="searchNext.emit()"
    />
  </div>

  <div class="sidebar-sections">
    <section
      class="sidebar-pane pane-places"
      [class.is-collapsed]="!isExpanded('lugares')"
      [style.flexBasis.%]="isExpanded('lugares') && isExpanded('capas') ? topPanePercent() : null"
    >
      <button
        type="button"
        class="pane-header"
        (click)="toggleSection('lugares')"
      >
        <span class="pane-header-left">
          <span class="pane-toggle-icon" [class.expanded]="isExpanded('lugares')">▾</span>
          <span class="pane-title">Lugares</span>
        </span>
      </button>

      <div class="pane-body" *ngIf="isExpanded('lugares')">
        <div class="places-tree">
          <app-mapa-tree
            [nodos]="nodos"
            [elementos]="elementos"
            [tipos]="tipos"
            [selectedNodoId]="selectedNodoId"
            [selectedElementoId]="selectedElementoId"
            [searchValue]="searchValue"
            [hiddenNodeIds]="hiddenNodeIds"
            [hiddenElementoIds]="hiddenElementoIds"
            (nodoSelected)="nodoSelected.emit($event)"
            (elementoSelected)="treeElementoSelected.emit($event)"
            (nodeVisibilityChange)="treeNodeVisibilityChange.emit($event)"
            (elementoVisibilityChange)="treeElementoVisibilityChange.emit($event)"
            (createNodeRequested)="treeCreateNodeRequested.emit($event)"
            (editNodeRequested)="treeEditNodeRequested.emit($event)"
            (deleteNodeRequested)="treeDeleteNodeRequested.emit($event)"
            (drawElementRequested)="treeDrawElementRequested.emit($event)"
            (centerElementoRequested)="treeCenterElementoRequested.emit($event)"
            (editDataElementoRequested)="treeEditDataElementoRequested.emit($event)"
            (editGeometryElementoRequested)="treeEditGeometryElementoRequested.emit($event)"
            (deleteElementoRequested)="treeDeleteElementoRequested.emit($event)"
          />
        </div>
      </div>
    </section>

    <div
      class="sidebar-splitter"
      *ngIf="isExpanded('lugares') && isExpanded('capas')"
      (pointerdown)="startResize($event)"
    >
      <span></span>
    </div>

    <section
      class="sidebar-pane pane-layers"
      [class.is-collapsed]="!isExpanded('capas')"
      [style.flexBasis.%]="isExpanded('lugares') && isExpanded('capas') ? (100 - topPanePercent()) : null"
    >
      <button
        type="button"
        class="pane-header"
        (click)="toggleSection('capas')"
      >
        <span class="pane-header-left">
          <span class="pane-toggle-icon" [class.expanded]="isExpanded('capas')">▾</span>
          <span class="pane-title">Uso de capas</span>
        </span>
      </button>

      <div class="pane-body" *ngIf="isExpanded('capas')">
        <app-mapa-capas-panel [tipos]="tipos" />
      </div>
    </section>
  </div>
</div>
