<p-dialog
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  [modal]="true"
  [closable]="!saving()"
  [dismissableMask]="!saving()"
  [style]="{ width: '44rem', maxWidth: '94vw' }"
  [contentStyle]="{ padding: '0', overflow: 'hidden' }"
  [header]="dialogTitle()"
>
  <div class="dialog-shell">
    <div class="dialog-view-scroll">
      <form class="dialog-body" [class.is-saving]="saving()" [formGroup]="form" (ngSubmit)="guardar()">
        <div class="save-blocker" *ngIf="saving()">
          <div class="save-blocker-card">
            <div class="save-blocker-title">Guardando elemento...</div>
            <div class="save-blocker-text">Espera un momento mientras se registra la información.</div>
          </div>
        </div>

        <fieldset class="dialog-fieldset" [disabled]="saving()">
          <div class="form-grid top-row">
            <div class="field field-node">
              <label for="elemento-nodo">Nodo</label>

              <ng-container *ngIf="!nodeLocked(); else lockedNodeField">
                <p-select
                  id="elemento-nodo"
                  class="node-select"
                  formControlName="idRedNodoFk"
                  [options]="nodosSelectOptions()"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Buscar y seleccionar nodo"
                  [filter]="true"
                  filterBy="label"
                  filterPlaceholder="Buscar nodo..."
                  [showClear]="true"
                  [appendTo]="'body'"
                  [emptyMessage]="'No hay nodos disponibles'"
                >
                </p-select>
              </ng-container>

              <ng-template #lockedNodeField>
                <input
                  id="elemento-nodo-locked"
                  type="text"
                  [value]="selectedNodoDisplay()"
                  disabled
                />
              </ng-template>

              <p class="field-error" *ngIf="controlError('idRedNodoFk') as err">{{ err }}</p>
            </div>

            <div class="field field-name">
              <label for="elemento-nombre">Nombre</label>
              <input
                id="elemento-nombre"
                type="text"
                formControlName="nombre"
                placeholder="Nombre"
              />
              <p class="field-error" *ngIf="controlError('nombre') as err">{{ err }}</p>
            </div>
          </div>

          <div class="field">
            <label for="elemento-descripcion">Descripción</label>
            <textarea
              id="elemento-descripcion"
              rows="4"
              formControlName="descripcion"
              placeholder="Descripción breve"
            ></textarea>
            <p class="field-error" *ngIf="controlError('descripcion') as err">{{ err }}</p>
          </div>

          <div class="field">
            <label>Tipo</label>

            <div class="tipo-groups" *ngIf="tiposAgrupados().length; else noTiposCompatibles">
              <section class="tipo-group" *ngFor="let group of tiposAgrupados(); trackBy: trackByGrupo">
                <div class="tipo-group-title">{{ group.agrupacion }}</div>

                <div class="tipo-options">
                  <label
                    class="tipo-option"
                    *ngFor="let tipo of group.tipos; trackBy: trackByTipo"
                    [class.active]="isTipoSelected(tipo)"
                  >
                    <input
                      type="radio"
                      name="elemento-tipo"
                      [checked]="isTipoSelected(tipo)"
                      (change)="onTipoPicked(tipo.idGeoTipoElemento)"
                    />

                    <span class="tipo-option-preview">
                      <span
                        class="tipo-preview-shape"
                        [ngClass]="previewShapeClass(tipo)"
                        [ngStyle]="previewStyle(tipo)"
                      >
                        <span
                          *ngIf="showMaterialPreview(tipo)"
                          class="tipo-preview-material"
                          [class]="previewMaterialFamily(tipo)"
                        >
                          {{ previewMaterialGlyph(tipo) }}
                        </span>

                        <i
                          *ngIf="showClassPreview(tipo)"
                          class="tipo-preview-class"
                          [class]="previewClass(tipo)"
                        ></i>

                        <img
                          *ngIf="showUrlPreview(tipo)"
                          class="tipo-preview-image"
                          [src]="previewImageUrl(tipo)"
                          alt=""
                        />
                      </span>
                    </span>

                    <span class="tipo-option-name">{{ tipo.nombre }}</span>
                  </label>
                </div>
              </section>
            </div>

            <ng-template #noTiposCompatibles>
              <div class="empty-state">
                No hay tipos compatibles con la geometría actual.
              </div>
            </ng-template>

            <p class="field-error" *ngIf="controlError('idGeoTipoElementoFk') as err">{{ err }}</p>
          </div>

          <div class="wkt-box">
            <div class="wkt-title">Geometría</div>
            <pre>{{ currentWkt() || 'Sin geometría' }}</pre>
          </div>
        </fieldset>

        <p class="error" *ngIf="error() as err">{{ err }}</p>
      </form>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button type="button" class="ghost-btn" [disabled]="saving()" (click)="requestClose()">
        Cancelar
      </button>

      <button
        type="button"
        class="save-btn"
        [disabled]="form.invalid || !currentWkt() || saving()"
        (click)="guardar()"
      >
        {{ saving() ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </ng-template>
</p-dialog>

<app-mapa-confirm-dialog #confirmDialog></app-mapa-confirm-dialog>
