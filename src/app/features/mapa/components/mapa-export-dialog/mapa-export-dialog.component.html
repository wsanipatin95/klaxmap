<p-dialog
  [visible]="visible()"
  (visibleChange)="onDialogVisibilityChange($event)"
  [modal]="true"
  [closable]="!loading()"
  [dismissableMask]="!loading()"
  [closeOnEscape]="!loading()"
  [style]="{ width: '38rem' }"
  header="Exportar KML"
>
  <div class="dialog-body" [class.is-busy]="loading()">
    <div class="dialog-blocker" *ngIf="loading()">
      <div class="dialog-blocker-card">
        <div class="dialog-blocker-title">Exportando archivo...</div>
        <div class="dialog-blocker-text">
          Espera un momento mientras se genera la descarga.
        </div>
      </div>
    </div>

    <div class="summary-card">
      <div class="summary-top">
        <span class="summary-title">Resumen</span>
        <span class="summary-count">{{ resultCount() }} resultado(s)</span>
      </div>

      <div class="summary-text">{{ filterSummary() }}</div>
    </div>

    <div class="form-grid">
      <div class="field span-2">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="form.nombreDocumento" [disabled]="loading()" />
      </div>

      <div class="field span-2">
        <label>Buscar</label>
        <input type="text" [(ngModel)]="form.q" [disabled]="loading()" />
      </div>

      <div class="field span-2">
        <label>Nodo</label>
        <select [(ngModel)]="form.idRedNodoFk" [disabled]="loading()">
          <option [ngValue]="null">Todos</option>
          <option *ngFor="let n of nodos" [ngValue]="n.idRedNodo">
            {{ n.nodo }}
          </option>
        </select>
      </div>

      <div class="field span-2">
        <label>Tipo</label>
        <select [(ngModel)]="form.idGeoTipoElementoFk" [disabled]="loading()">
          <option [ngValue]="null">Todos</option>
          <option *ngFor="let t of tipos" [ngValue]="t.idGeoTipoElemento">
            {{ t.nombre }}
          </option>
        </select>
      </div>

      <div class="field span-2">
        <label>Visibilidad</label>
        <select [(ngModel)]="form.visible" [disabled]="loading()">
          <option [ngValue]="true">Sólo visibles</option>
          <option [ngValue]="false">Sólo no visibles</option>
          <option [ngValue]="null">Todos</option>
        </select>
      </div>
    </div>

    <div class="dialog-note">
      La exportación usa los filtros del formulario.
    </div>

    <p class="error" *ngIf="error() as err">{{ err }}</p>
  </div>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      label="Cerrar"
      severity="secondary"
      [disabled]="loading()"
      (click)="close()"
    ></button>

    <button
      pButton
      type="button"
      label="{{ loading() ? 'Exportando...' : 'Exportar' }}"
      [disabled]="loading()"
      (click)="exportar()"
    ></button>
  </ng-template>
</p-dialog>
