<div class="pt-4 md:px-8">
  <h1 class="text-primary-900 font-bold text-xl">Panel de Configuración</h1>
  <div class="card flex flex-col md:flex-row gap-4 mt-4">
    <p-panelmenu [model]="items" styleClass="w-full md:w-80 gap-0">
      <ng-template #item let-item>
        <a pRipple class="flex items-center px-4 py-2 cursor-pointer group">
          <i [class]="item.icon + ' text-primary group-hover:text-inherit'"></i>
          <span class="ml-2">
            {{ item.label }}
          </span>
          <p-badge *ngIf="item.badge" class="ml-auto" [value]="item.badge" />
          <span
            *ngIf="item.shortcut"
            class="ml-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1"
          >
            {{ item.shortcut }}
          </span>
        </a>
      </ng-template>
    </p-panelmenu>
  </div>
</div>
